<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek 调试版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e4e4e7;
            height: 100vh;
            display: flex;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: #1a1a1a;
            border-right: 1px solid #2c2c2e;
            transform: translateX(-100%);
            transition: transform 0.2s;
            z-index: 30;
            display: flex;
            flex-direction: column;
        }
        .sidebar.open { transform: translateX(0); }
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 20;
            display: none;
        }
        .overlay.show { display: block; }
        .sidebar-header { padding: 20px 16px; border-bottom: 1px solid #2c2c2e; }
        .new-chat-btn {
            width: 100%;
            background: #2c2c2e;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 14px;
            font-size: 15px;
            cursor: pointer;
        }
        .history-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
        .history-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            background: #1f1f1f;
            border: 1px solid #2c2c2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item.active { background: #2d2d30; border-color: #4a6e8c; }
        .history-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; font-size: 14px; }
        .delete-history { background: none; border: none; color: #8e8e93; font-size: 18px; cursor: pointer; padding: 4px 8px; }
        .main { flex: 1; display: flex; flex-direction: column; height: 100%; background: #0f0f0f; }
        .top-bar {
            padding: 12px 16px;
            background: #0f0f0f;
            border-bottom: 1px solid #2c2c2e;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menu-btn, .search-btn, .nav-btn {
            background: #1c1c1e;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
        }
        .logo-area { font-weight: 600; font-size: 18px; flex: 1; }
        .search-panel {
            position: absolute;
            top: 70px;
            right: 16px;
            background: #1c1c1e;
            border-radius: 20px;
            padding: 12px;
            z-index: 50;
            min-width: 260px;
            border: 1px solid #3a3a3c;
            display: none;
        }
        .search-panel.show { display: block; }
        .search-input { width: 100%; background: #2c2c2e; border: none; color: white; padding: 8px 12px; border-radius: 24px; font-size: 14px; }
        .search-stats { font-size: 11px; color: #8e8e93; margin-top: 8px; text-align: center; }
        .search-nav { display: flex; gap: 12px; justify-content: center; margin-top: 8px; }
        .search-nav-btn { background: #2b4f7c; border: none; color: white; padding: 4px 12px; border-radius: 16px; cursor: pointer; font-size: 12px; }
        .highlight { background-color: #ffd966; color: #1a1a1a; border-radius: 2px; padding: 0 2px; }
        .highlight-current { background-color: #ffaa33; color: #1a1a1a; border-radius: 2px; padding: 0 2px; }
        .messages-container { flex: 1; overflow-y: auto; padding: 16px 16px 90px 16px; display: flex; flex-direction: column; gap: 16px; }
        .message { display: flex; gap: 10px; max-width: 100%; }
        .message.user { justify-content: flex-end; }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 32px;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .message.user .avatar { background: #2b4f7c; order: 2; }
        .bubble {
            background: #1e1e20;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.45;
            font-size: 15px;
            max-width: 85%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .message.user .bubble { background: #2b4f7c; }
        .message-actions { display: flex; gap: 8px; margin-top: 6px; justify-content: flex-end; }
        .edit-btn, .regenerate-btn { background: #2c2c2e; border: none; color: #aaa; font-size: 12px; padding: 4px 10px; border-radius: 16px; cursor: pointer; }
        .copy-btn { background: #3a3a3c; border: none; color: #ccc; font-size: 11px; padding: 3px 8px; border-radius: 14px; cursor: pointer; margin-top: 6px; display: inline-block; }
        .edit-textarea { width: 100%; background: #2c2c2e; border: 1px solid #4a6e8c; color: white; padding: 8px; border-radius: 12px; font-family: inherit; font-size: 14px; resize: vertical; }
        .edit-actions { display: flex; gap: 8px; margin-top: 6px; }
        .save-edit-btn, .cancel-edit-btn { background: #2b4f7c; border: none; color: white; padding: 5px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; }
        .cancel-edit-btn { background: #3a3a3c; }
        .input-area { background: #0f0f0f; border-top: 1px solid #2c2c2e; padding: 10px 12px 16px 12px; }
        .input-wrapper { display: flex; gap: 8px; align-items: center; background: #1c1c1e; border-radius: 30px; padding: 4px 10px; }
        .file-label { background: none; border: none; font-size: 24px; cursor: pointer; color: #8e8e93; padding: 6px; }
        #fileInput { display: none; }
        .message-input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; padding: 10px 4px; max-height: 100px; font-family: inherit; resize: none; }
        .message-input:focus { outline: none; }
        .send-btn { background: #2b4f7c; border: none; color: white; width: 40px; height: 40px; border-radius: 30px; font-size: 18px; cursor: pointer; }
        .send-btn:disabled { opacity: 0.5; }
        .file-preview-badge { background: #1c1c1e; border-radius: 20px; padding: 4px 12px; margin-top: 6px; display: inline-flex; align-items: center; gap: 8px; font-size: 12px; }
        .remove-file { background: none; border: none; color: #ff453a; font-size: 16px; cursor: pointer; }
        .status-indicator { display: inline-block; width: 8px; height: 8px; background: #2b4f7c; border-radius: 8px; margin-right: 6px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 100% { opacity: 1; } }
        @media (min-width: 768px) {
            .sidebar { transform: translateX(0); position: relative; }
            .overlay { display: none !important; }
            .menu-btn { display: none; }
        }
        .error-toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: #ff3b30;
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            z-index: 100;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header"><button class="new-chat-btn" id="newChatBtn">+ 新建对话</button></div>
    <div class="history-list" id="historyList"></div>
    <div style="padding: 14px; font-size: 10px; color: #5c5c5e; text-align: center; border-top:1px solid #2c2c2e;">API Key 本地存储</div>
</div>
<div class="overlay" id="overlay"></div>

<div class="main">
    <div class="top-bar">
        <button class="menu-btn" id="menuToggle">☰</button>
        <div class="logo-area">DeepSeek</div>
        <button class="search-btn" id="searchBtn">🔍</button>
        <button class="nav-btn" id="scrollTopBtn">↑</button>
        <button class="nav-btn" id="scrollBottomBtn">↓</button>
    </div>
    <div class="search-panel" id="searchPanel">
        <input type="text" id="searchInput" class="search-input" placeholder="搜索对话内容...">
        <div class="search-stats" id="searchStats">0 个结果</div>
        <div class="search-nav">
            <button class="search-nav-btn" id="prevMatchBtn">◀ 上一个</button>
            <button class="search-nav-btn" id="nextMatchBtn">下一个 ▶</button>
        </div>
    </div>
    <div class="messages-container" id="messagesContainer">
        <div class="message assistant"><div class="avatar">🤖</div><div class="bubble">✨ 调试版 - 点击发送会显示错误信息</div></div>
    </div>
    <div class="input-area">
        <div class="input-wrapper">
            <label class="file-label">📎<input type="file" id="fileInput" accept=".txt,.md,.json,.csv,.js,.py,.html,.css,.xml"></label>
            <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <div id="filePreviewArea" style="min-height: 28px;"></div>
    </div>
</div>

<script>
window.onload = function() {
    console.log('页面加载完成');
    
    // 显示错误提示的函数
    function showError(msg) {
        let toast = document.createElement('div');
        toast.className = 'error-toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 4000);
        console.error(msg);
    }
    
    // ========== API Key ==========
    let API_KEY = localStorage.getItem('deepseek_api_key');
    if (!API_KEY) {
        let key = prompt('🔑 输入 DeepSeek API Key (从 platform.deepseek.com 获取)\n如果没有请先注册获取');
        if (key && key.trim()) {
            API_KEY = key.trim();
            localStorage.setItem('deepseek_api_key', API_KEY);
            showError('✅ API Key 已保存');
        } else {
            API_KEY = '';
            showError('❌ 未输入 API Key，无法发送消息');
        }
    }
    
    const DEEPSEEK_URL = 'https://api.deepseek.com/v1/chat/completions';
    
    // ========== 数据 ==========
    let conversations = [];
    let currentId = null;
    let isGenerating = false;
    let pendingFile = null;
    
    // ========== DOM 元素 ==========
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuToggle = document.getElementById('menuToggle');
    const newChatBtn = document.getElementById('newChatBtn');
    const historyList = document.getElementById('historyList');
    const msgContainer = document.getElementById('messagesContainer');
    const msgInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const filePreviewArea = document.getElementById('filePreviewArea');
    const scrollTopBtn = document.getElementById('scrollTopBtn');
    const scrollBottomBtn = document.getElementById('scrollBottomBtn');
    const searchBtn = document.getElementById('searchBtn');
    const searchPanel = document.getElementById('searchPanel');
    const searchInput = document.getElementById('searchInput');
    const searchStats = document.getElementById('searchStats');
    const prevMatchBtn = document.getElementById('prevMatchBtn');
    const nextMatchBtn = document.getElementById('nextMatchBtn');
    
    // ========== 辅助函数 ==========
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            return m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;');
        });
    }
    
    function formatLines(text) {
        if (!text) return '';
        return escapeHtml(text).replace(/\n/g, '<br>');
    }
    
    function saveData() {
        localStorage.setItem('deepseek_convs', JSON.stringify(conversations));
    }
    
    function loadData() {
        let raw = localStorage.getItem('deepseek_convs');
        if (raw) {
            try {
                conversations = JSON.parse(raw);
                if (!Array.isArray(conversations)) conversations = [];
                conversations.forEach(c => { if (!c.messages) c.messages = []; });
            } catch(e) { conversations = []; }
        }
        if (!conversations.length) {
            conversations = [{ id: Date.now().toString(), title: '新对话', messages: [] }];
        }
        if (!currentId || !conversations.find(c => c.id === currentId)) {
            currentId = conversations[0].id;
        }
    }
    
    function scrollToBottom() {
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }
    
    function scrollToTop() {
        msgContainer.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function renderSidebar() {
        historyList.innerHTML = '';
        for (let conv of conversations) {
            const div = document.createElement('div');
            div.className = 'history-item';
            if (conv.id === currentId) div.classList.add('active');
            let title = conv.title || '新对话';
            if (title === '新对话') {
                let firstUser = conv.messages.find(m => m.role === 'user');
                if (firstUser) title = firstUser.content.slice(0, 24);
            }
            div.innerHTML = `<span class="history-title">${escapeHtml(title)}</span><button class="delete-history" data-id="${conv.id}">🗑</button>`;
            const delBtn = div.querySelector('.delete-history');
            delBtn.onclick = function(e) {
                e.stopPropagation();
                if (conversations.length === 1) { showError('至少保留一个对话'); return; }
                conversations = conversations.filter(c => c.id !== conv.id);
                if (currentId === conv.id) currentId = conversations[0].id;
                saveData();
                renderSidebar();
                renderMessages();
            };
            div.onclick = function() {
                if (isGenerating) { showError('请等待回复完成'); return; }
                currentId = conv.id;
                renderSidebar();
                renderMessages();
                if (window.innerWidth < 768) closeSidebar();
            };
            historyList.appendChild(div);
        }
    }
    
    function renderMessages() {
        let conv = conversations.find(c => c.id === currentId);
        if (!conv) return;
        msgContainer.innerHTML = '';
        if (conv.messages.length === 0) {
            msgContainer.innerHTML = `<div class="message assistant"><div class="avatar">🤖</div><div class="bubble">发送消息开始对话</div></div>`;
            return;
        }
        for (let i = 0; i < conv.messages.length; i++) {
            const msg = conv.messages[i];
            const div = document.createElement('div');
            div.className = `message ${msg.role}`;
            const avatar = msg.role === 'user' ? '👤' : '🤖';
            div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${formatLines(msg.content)}</div>`;
            const bubble = div.querySelector('.bubble');
            if (msg.role === 'assistant' && msg.content) {
                const copyBtn = document.createElement('button');
                copyBtn.innerText = '📋 复制';
                copyBtn.className = 'copy-btn';
                copyBtn.onclick = function() { copyToClip(msg.content); };
                bubble.appendChild(copyBtn);
            }
            if (msg.role === 'user') {
                const actionDiv = document.createElement('div');
                actionDiv.className = 'message-actions';
                const editBtn = document.createElement('button');
                editBtn.innerText = '✏️ 编辑';
                editBtn.className = 'edit-btn';
                editBtn.onclick = function() { showError('编辑功能开发中'); };
                const regenBtn = document.createElement('button');
                regenBtn.innerText = '🔄 重新生成';
                regenBtn.className = 'regenerate-btn';
                regenBtn.onclick = function() { showError('重新生成功能开发中'); };
                actionDiv.appendChild(editBtn);
                actionDiv.appendChild(regenBtn);
                bubble.appendChild(actionDiv);
            }
            msgContainer.appendChild(div);
        }
        scrollToBottom();
    }
    
    async function copyToClip(text) {
        try {
            await navigator.clipboard.writeText(text);
            showError('✅ 已复制');
        } catch(e) {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showError('✅ 已复制');
        }
    }
    
    // ========== 发送消息 (核心功能，带详细错误) ==========
    async function sendMessage() {
        console.log('sendMessage 被调用');
        
        // 检查1: API Key
        if (!API_KEY) {
            showError('❌ 未设置 API Key，请刷新页面重新输入');
            return;
        }
        
        // 检查2: 输入内容
        let userText = msgInput.value.trim();
        if (!userText && !pendingFile) {
            showError('❌ 请输入消息内容');
            return;
        }
        
        showError('⏳ 正在发送消息到 DeepSeek...');
        
        let displayText = userText;
        let fileContent = '';
        if (pendingFile) {
            displayText = userText ? `${userText}\n📎 [文件: ${pendingFile.name}]` : `📎 [文件: ${pendingFile.name}]`;
            fileContent = `\n\n===== 文件 "${pendingFile.name}" 内容 =====\n${pendingFile.content}\n===== 结束 =====\n请根据文件内容回答。`;
            pendingFile = null;
            filePreviewArea.innerHTML = '';
            fileInput.value = '';
        }
        
        // 获取当前对话
        let conv = conversations.find(c => c.id === currentId);
        if (!conv) {
            showError('❌ 对话不存在');
            return;
        }
        
        // 添加用户消息
        conv.messages.push({ role: 'user', content: displayText });
        saveData();
        renderMessages();
        
        msgInput.value = '';
        msgInput.style.height = 'auto';
        
        // 添加占位 assistant 消息
        conv.messages.push({ role: 'assistant', content: '' });
        saveData();
        renderMessages();
        
        // 获取最后一条 assistant 气泡
        const bubbles = document.querySelectorAll('.message.assistant .bubble');
        let targetBubble = bubbles[bubbles.length - 1];
        if (!targetBubble) {
            showError('❌ 无法找到消息气泡');
            return;
        }
        
        // 构建 API 请求
        let apiMessages = [
            { role: 'system', content: '你是DeepSeek助手，回答请使用换行分段，让阅读更舒适。' }
        ];
        for (let i = 0; i <= conv.messages.length - 2; i++) {
            let msg = conv.messages[i];
            let content = msg.content;
            if (i === conv.messages.length - 2 && fileContent) {
                content = displayText + fileContent;
            }
            apiMessages.push({ role: msg.role, content: content });
        }
        
        isGenerating = true;
        sendBtn.disabled = true;
        targetBubble.innerHTML = '<span class="status-indicator"></span> 生成中...';
        
        try {
            showError('📡 正在调用 DeepSeek API...');
            console.log('API 请求:', JSON.stringify({ model: 'deepseek-chat', messages: apiMessages.slice(0,2) }));
            
            let response = await fetch(DEEPSEEK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: apiMessages,
                    stream: true,
                    temperature: 0.7,
                    max_tokens: 2048
                })
            });
            
            if (!response.ok) {
                let errorText = await response.text();
                console.error('API 错误:', response.status, errorText);
                throw new Error(`HTTP ${response.status}: ${errorText.slice(0, 200)}`);
            }
            
            showError('✅ 连接成功，开始接收回复...');
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullAnswer = '';
            let buffer = '';
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (let line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const json = JSON.parse(data);
                            const delta = json.choices[0]?.delta?.content || '';
                            if (delta) {
                                fullAnswer += delta;
                                targetBubble.innerHTML = formatLines(fullAnswer);
                                scrollToBottom();
                            }
                        } catch(e) {}
                    }
                }
            }
            
            targetBubble.innerHTML = formatLines(fullAnswer || '(空回复)');
            const copyBtn = document.createElement('button');
            copyBtn.innerText = '📋 复制';
            copyBtn.className = 'copy-btn';
            copyBtn.onclick = function() { copyToClip(fullAnswer); };
            targetBubble.appendChild(copyBtn);
            
            // 保存回复
            let curr = conversations.find(c => c.id === currentId);
            if (curr && curr.messages[curr.messages.length-1]?.role === 'assistant') {
                curr.messages[curr.messages.length-1].content = fullAnswer;
                saveData();
            }
            
            showError('✅ 回复完成！');
            
            // 更新对话标题
            if (conv.messages.filter(m => m.role === 'user').length === 1) {
                conv.title = displayText.slice(0, 26) || '新对话';
                saveData();
                renderSidebar();
            }
            
        } catch(err) {
            console.error('发送失败:', err);
            targetBubble.innerHTML = formatLines(`❌ 请求失败: ${err.message}`);
            showError(`❌ 错误: ${err.message}`);
        } finally {
            isGenerating = false;
            sendBtn.disabled = false;
        }
    }
    
    function onFileSelected(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            pendingFile = { name: file.name, content: e.target.result };
            filePreviewArea.innerHTML = `<div class="file-preview-badge">📎 已附加: ${escapeHtml(file.name)} <button class="remove-file" id="clearFileBtn">✖</button></div>`;
            const clearBtn = document.getElementById('clearFileBtn');
            if (clearBtn) {
                clearBtn.onclick = function() { pendingFile = null; filePreviewArea.innerHTML = ''; fileInput.value = ''; };
            }
            showError(`✅ 已加载文件: ${file.name} (${e.target.result.length} 字符)`);
        };
        reader.onerror = function() { showError('❌ 文件读取失败'); };
        reader.readAsText(file, 'UTF-8');
    }
    
    function autoResize() {
        msgInput.style.height = 'auto';
        msgInput.style.height = Math.min(100, msgInput.scrollHeight) + 'px';
    }
    
    function newConversation() {
        if (isGenerating) { showError('请等待回复完成'); return; }
        conversations.unshift({ id: Date.now().toString(), title: '新对话', messages: [] });
        currentId = conversations[0].id;
        saveData();
        renderSidebar();
        renderMessages();
        if (window.innerWidth < 768) closeSidebar();
        showError('✅ 已创建新对话');
    }
    
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); }
    
    // ========== 绑定事件 ==========
    menuToggle.onclick = function() { sidebar.classList.contains('open') ? closeSidebar() : openSidebar(); };
    overlay.onclick = closeSidebar;
    newChatBtn.onclick = newConversation;
    sendBtn.onclick = sendMessage;
    scrollTopBtn.onclick = scrollToTop;
    scrollBottomBtn.onclick = scrollToBottom;
    searchBtn.onclick = function() { searchPanel.classList.toggle('show'); };
    searchInput.oninput = function() { showError('搜索功能开发中'); };
    prevMatchBtn.onclick = function() { showError('搜索功能开发中'); };
    nextMatchBtn.onclick = function() { showError('搜索功能开发中'); };
    fileInput.onchange = function(e) { if (e.target.files[0]) onFileSelected(e.target.files[0]); };
    msgInput.onkeydown = function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
    msgInput.oninput = autoResize;
    
    // ========== 启动 ==========
    loadData();
    renderSidebar();
    renderMessages();
    autoResize();
    
    if (API_KEY) {
        showError('✅ 初始化完成，API Key 已设置');
    } else {
        showError('⚠️ 请刷新页面并输入 API Key');
    }
};
</script>
</body>
</html>
