<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek 增强版 · 个人助理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f0f0f;
            color: #e4e4e7;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100%;
            position: relative;
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: #1a1a1a;
            border-right: 1px solid #2c2c2e;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            z-index: 30;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 12px rgba(0,0,0,0.4);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            z-index: 20;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #2c2c2e;
        }

        .new-chat-btn {
            width: 100%;
            background: #2c2c2e;
            border: none;
            color: white;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1f1f1f;
            border: 1px solid #2c2c2e;
        }

        .history-item.active {
            background: #2d2d30;
            border-color: #4a4a4e;
        }

        .history-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .delete-history {
            background: none;
            border: none;
            color: #8e8e93;
            cursor: pointer;
            font-size: 18px;
            padding: 0 4px;
            opacity: 0;
            transition: opacity 0.1s;
        }

        .history-item:hover .delete-history {
            opacity: 1;
        }

        /* 主聊天区域 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: #0f0f0f;
        }

        .top-bar {
            padding: 12px 16px;
            background: #0f0f0f;
            border-bottom: 1px solid #2c2c2e;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-btn {
            background: #1c1c1e;
            border: none;
            color: white;
            font-size: 24px;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .logo-area {
            font-weight: 600;
            font-size: 18px;
            flex: 1;
            cursor: pointer;
            user-select: none;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 80px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 100%;
        }

        .message.user {
            justify-content: flex-end;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 32px;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #3a6ea5;
            order: 2;
        }

        .bubble {
            background: #1e1e20;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 15px;
            max-width: 85%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .bubble {
            background: #2b4f7c;
        }

        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #8e8e93;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            margin-left: 12px;
            cursor: pointer;
            transition: 0.1s;
        }

        .message-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .role-name {
            font-size: 12px;
            font-weight: 500;
            color: #8e8e93;
        }

        .file-card {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2c2c2e;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            margin: 4px 0;
            max-width: 100%;
        }

        /* 底部输入区域 */
        .input-area {
            background: #0f0f0f;
            border-top: 1px solid #2c2c2e;
            padding: 12px 16px 20px 16px;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: #1c1c1e;
            border-radius: 28px;
            padding: 8px 12px;
        }

        .file-label {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 6px;
            line-height: 1;
            color: #8e8e93;
        }

        #fileInput {
            display: none;
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 8px 4px;
            max-height: 120px;
            resize: none;
            font-family: inherit;
        }

        .message-input:focus {
            outline: none;
        }

        .send-btn {
            background: #2b4f7c;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .file-preview {
            font-size: 12px;
            color: #8e8e93;
            padding: 4px 12px 0 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .remove-file {
            background: none;
            border: none;
            color: #ff453a;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .sidebar {
                position: relative;
                transform: translateX(0);
                width: 280px;
                display: flex;
            }
            .overlay {
                display: none !important;
            }
            .menu-btn {
                display: none;
            }
        }

        /* 移动端优化 */
        @media (max-width: 767px) {
            .bubble {
                max-width: 90%;
            }
            .send-btn {
                width: 44px;
                height: 44px;
                font-size: 20px;
            }
            .file-label {
                font-size: 28px;
                padding: 4px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
        </div>
        <div class="history-list" id="historyList"></div>
        <div style="padding: 16px; font-size: 11px; color: #5c5c5e; border-top: 1px solid #2c2c2e; text-align: center;">
            API Key 存储在本地
        </div>
    </div>
    <div class="overlay" id="overlay"></div>

    <div class="main">
        <div class="top-bar">
            <button class="menu-btn" id="menuToggle">☰</button>
            <div class="logo-area" id="scrollToTopBtn">DeepSeek · 个人助理</div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="message assistant">
                <div class="avatar">🤖</div>
                <div class="bubble">你好！我是 DeepSeek，支持上传文件。点击标题回到顶部，每条消息可复制。手机端点击蓝色按钮发送消息～</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <label class="file-label" title="上传文件">📎
                    <input type="file" id="fileInput" accept=".txt,.md,.json,.csv,.js,.py,.html,.css,.xml">
                </label>
                <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
            <div id="filePreviewArea" class="file-preview"></div>
        </div>
    </div>
</div>

<script>
    // ========== API Key 配置 ==========
    let API_KEY = localStorage.getItem('deepseek_api_key') || '';
    if (!API_KEY) {
        const userKey = prompt('🔐 请输入你的 DeepSeek API Key：\n(可从 platform.deepseek.com 获取)');
        if (userKey && userKey.trim()) {
            API_KEY = userKey.trim();
            localStorage.setItem('deepseek_api_key', API_KEY);
        }
    }

    const DEEPSEEK_URL = 'https://api.deepseek.com/v1/chat/completions';
    const MODEL = 'deepseek-chat';

    // 数据结构
    let conversations = [];
    let currentConversationId = null;
    let isGenerating = false;
    let pendingFile = null;

    // DOM 元素
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuToggle = document.getElementById('menuToggle');
    const newChatBtn = document.getElementById('newChatBtn');
    const historyList = document.getElementById('historyList');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const filePreview = document.getElementById('filePreviewArea');
    const scrollToTopBtn = document.getElementById('scrollToTopBtn');

    // ========== 存储操作 ==========
    function saveConversations() {
        localStorage.setItem('deepseek_conversations', JSON.stringify(conversations));
    }

    function loadConversations() {
        const raw = localStorage.getItem('deepseek_conversations');
        if (raw) {
            try {
                conversations = JSON.parse(raw);
                if (!Array.isArray(conversations)) conversations = [];
            } catch(e) { conversations = []; }
        }
        if (conversations.length === 0) {
            const newId = Date.now().toString();
            conversations = [{ id: newId, title: '新对话', messages: [] }];
        }
        if (!currentConversationId || !conversations.find(c => c.id === currentConversationId)) {
            currentConversationId = conversations[0].id;
        }
    }

    // 渲染侧边栏
    function renderHistory() {
        historyList.innerHTML = '';
        conversations.forEach(conv => {
            const div = document.createElement('div');
            div.className = 'history-item';
            if (conv.id === currentConversationId) div.classList.add('active');
            const title = conv.title || (conv.messages[0]?.content?.slice(0, 25) || '新对话');
            div.innerHTML = `
                <span class="history-title">${escapeHtml(title)}</span>
                <button class="delete-history" data-id="${conv.id}">🗑</button>
            `;
            div.onclick = (e) => {
                if (e.target.classList.contains('delete-history')) return;
                switchConversation(conv.id);
            };
            const delBtn = div.querySelector('.delete-history');
            delBtn.onclick = (e) => {
                e.stopPropagation();
                deleteConversation(conv.id);
            };
            historyList.appendChild(div);
        });
    }

    function deleteConversation(id) {
        if (conversations.length === 1) {
            alert('至少保留一个对话');
            return;
        }
        conversations = conversations.filter(c => c.id !== id);
        if (currentConversationId === id) currentConversationId = conversations[0].id;
        saveConversations();
        renderHistory();
        renderCurrentChat();
    }

    function switchConversation(id) {
        if (isGenerating) {
            alert('请等待回复完成');
            return;
        }
        currentConversationId = id;
        renderHistory();
        renderCurrentChat();
        if (window.innerWidth < 768) closeSidebar();
    }

    // 渲染聊天内容
    function renderCurrentChat() {
        const conv = conversations.find(c => c.id === currentConversationId);
        if (!conv) return;
        messagesContainer.innerHTML = '';
        
        if (conv.messages.length === 0) {
            messagesContainer.innerHTML = '<div class="message assistant"><div class="avatar">🤖</div><div class="bubble">有什么可以帮你的？上传文件或直接提问～</div></div>';
        } else {
            conv.messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.role}`;
                
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                const header = document.createElement('div');
                header.className = 'message-header';
                const roleSpan = document.createElement('span');
                roleSpan.className = 'role-name';
                roleSpan.innerText = msg.role === 'user' ? '你' : 'DeepSeek';
                const copyBtn = document.createElement('button');
                copyBtn.innerText = '复制';
                copyBtn.className = 'copy-btn';
                copyBtn.onclick = () => copyToClipboard(msg.content);
                header.appendChild(roleSpan);
                header.appendChild(copyBtn);
                
                const contentDiv = document.createElement('div');
                contentDiv.style.whiteSpace = 'pre-wrap';
                contentDiv.style.wordBreak = 'break-word';
                contentDiv.innerText = msg.content;
                
                bubble.appendChild(header);
                bubble.appendChild(contentDiv);
                
                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.innerText = msg.role === 'user' ? '👤' : '🤖';
                
                msgDiv.appendChild(avatar);
                msgDiv.appendChild(bubble);
                messagesContainer.appendChild(msgDiv);
            });
        }
        scrollToBottom();
    }

    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            alert('已复制到剪贴板');
        } catch(err) {
            alert('复制失败');
        }
    }

    function addMessage(role, content, save = true) {
        const conv = conversations.find(c => c.id === currentConversationId);
        if (!conv) return;
        conv.messages.push({ role, content });
        if (save) saveConversations();
        if (role === 'user' && conv.messages.filter(m => m.role === 'user').length === 1) {
            conv.title = content.slice(0, 25);
            renderHistory();
        }
        renderCurrentChat();
    }

    // 发送消息（核心功能）
    async function sendMessage() {
        // 调试：确保函数被调用
        console.log('sendMessage 被调用');
        
        if (isGenerating) {
            alert('请等待回复完成');
            return;
        }
        
        let userText = messageInput.value.trim();
        if (!userText && !pendingFile) return;
        
        // 处理文件
        let fileContentForAI = '';
        let fileName = null;
        if (pendingFile) {
            fileName = pendingFile.name;
            fileContentForAI = `\n\n[用户上传了文件: ${fileName}]\n文件内容:\n${pendingFile.content.slice(0, 3000)}`;
            // 显示文件卡片
            const conv = conversations.find(c => c.id === currentConversationId);
            if (conv) {
                conv.messages.push({ role: 'user', content: `📎 上传了文件: ${fileName}`, isFileCard: true });
                saveConversations();
                renderCurrentChat();
            }
            pendingFile = null;
            clearFilePreview();
        }
        
        // 组合发送给AI的内容
        let finalContent = userText;
        if (fileName) {
            finalContent = userText ? userText + fileContentForAI : `请分析这个文件：${fileName}${fileContentForAI}`;
        }
        if (!finalContent) return;
        
        // 添加用户消息
        addMessage('user', userText || `[文件: ${fileName}]`);
        messageInput.value = '';
        autoResizeTextarea();
        
        // 添加AI占位
        const conv = conversations.find(c => c.id === currentConversationId);
        const msgIndex = conv.messages.length;
        conv.messages.push({ role: 'assistant', content: '' });
        saveConversations();
        renderCurrentChat();
        
        // 获取最后一条气泡用于光标效果
        const bubbles = document.querySelectorAll('.message.assistant .bubble');
        const lastBubble = bubbles[bubbles.length - 1];
        if (lastBubble) lastBubble.classList.add('typing-cursor');
        
        isGenerating = true;
        sendBtn.disabled = true;
        
        // 构建API消息历史
        const apiMessages = [
            { role: 'system', content: '你是DeepSeek助手，回答要清晰分段，使用换行和标点提升可读性。' }
        ];
        // 添加历史消息（跳过文件卡片）
        for (let m of conv.messages.slice(0, -1)) {
            if (m.isFileCard) continue;
            apiMessages.push({ role: m.role, content: m.content });
        }
        // 添加当前真实消息（带文件内容）
        apiMessages.push({ role: 'user', content: finalContent });
        
        try {
            const response = await fetch(DEEPSEEK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: apiMessages,
                    stream: true,
                    temperature: 0.7
                })
            });
            
            if (!response.ok) {
                throw new Error(`API错误: ${response.status}`);
            }
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullContent = '';
            let buffer = '';
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const json = JSON.parse(data);
                            const delta = json.choices[0]?.delta?.content || '';
                            if (delta) {
                                fullContent += delta;
                                const currentConv = conversations.find(c => c.id === currentConversationId);
                                if (currentConv && currentConv.messages[msgIndex]) {
                                    currentConv.messages[msgIndex].content = fullContent;
                                    // 实时更新UI
                                    const currentBubbles = document.querySelectorAll('.message.assistant .bubble');
                                    if (currentBubbles[msgIndex]) {
                                        const contentDiv = currentBubbles[msgIndex].querySelector('div:last-child');
                                        if (contentDiv) contentDiv.innerText = fullContent;
                                    }
                                }
                                scrollToBottom();
                            }
                        } catch(e) {}
                    }
                }
            }
            if (lastBubble) lastBubble.classList.remove('typing-cursor');
            saveConversations();
            renderCurrentChat();
        } catch(err) {
            console.error(err);
            const convErr = conversations.find(c => c.id === currentConversationId);
            if (convErr && convErr.messages[msgIndex]) {
                convErr.messages[msgIndex].content = `错误: ${err.message}`;
                saveConversations();
                renderCurrentChat();
            }
        } finally {
            isGenerating = false;
            sendBtn.disabled = false;
            scrollToBottom();
        }
    }
    
    // 文件处理
    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            let content = e.target.result;
            if (content.length > 5000) content = content.slice(0, 5000) + '\n...(已截断)';
            pendingFile = { name: file.name, content: content };
            filePreview.innerHTML = `<span>📄 ${escapeHtml(file.name)}</span><button class="remove-file" id="removeFileBtn">✖</button>`;
            const removeBtn = document.getElementById('removeFileBtn');
            if (removeBtn) removeBtn.onclick = () => { pendingFile = null; filePreview.innerHTML = ''; fileInput.value = ''; };
        };
        reader.readAsText(file, 'UTF-8');
    }
    
    function clearFilePreview() {
        filePreview.innerHTML = '';
        pendingFile = null;
        fileInput.value = '';
    }
    
    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    function scrollToTop() {
        messagesContainer.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function autoResizeTextarea() {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(100, messageInput.scrollHeight) + 'px';
    }
    
    function newConversation() {
        if (isGenerating) {
            alert('请等待回复完成');
            return;
        }
        const newId = Date.now().toString();
        conversations.unshift({ id: newId, title: '新对话', messages: [] });
        currentConversationId = newId;
        saveConversations();
        renderHistory();
        renderCurrentChat();
        if (window.innerWidth < 768) closeSidebar();
    }
    
    function closeSidebar() {
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
    }
    function openSidebar() {
        sidebar.classList.add('open');
        overlay.classList.add('show');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }
    
    // ========== 事件绑定 ==========
    menuToggle.addEventListener('click', () => {
        if (sidebar.classList.contains('open')) closeSidebar();
        else openSidebar();
    });
    overlay.addEventListener('click', closeSidebar);
    newChatBtn.addEventListener('click', newConversation);
    
    // 修复：发送按钮点击事件（关键修复）
    sendBtn.addEventListener('click', function(e) {
        e.preventDefault();
        console.log('发送按钮被点击');
        sendMessage();
    });
    
    // 键盘事件：Enter发送，Shift+Enter换行
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    messageInput.addEventListener('input', autoResizeTextarea);
    fileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) handleFile(e.target.files[0]);
    });
    scrollToTopBtn.addEventListener('click', scrollToTop);
    
    // 初始化
    loadConversations();
    renderHistory();
    renderCurrentChat();
    autoResizeTextarea();
    
    if (!API_KEY) {
        setTimeout(() => alert('⚠️ 未设置 API Key，请刷新页面重新输入'), 100);
    }
</script>
</body>
</html>
