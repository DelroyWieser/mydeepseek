<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek 完整文件读取版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f0f0f;
            color: #e4e4e7;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: #1a1a1a;
            border-right: 1px solid #2c2c2e;
            transform: translateX(-100%);
            transition: transform 0.2s ease;
            z-index: 30;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 12px rgba(0,0,0,0.5);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            z-index: 20;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #2c2c2e;
        }

        .new-chat-btn {
            width: 100%;
            background: #2c2c2e;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            background: #1f1f1f;
            border: 1px solid #2c2c2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item.active {
            background: #2d2d30;
            border-color: #4a6e8c;
        }

        .history-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            font-size: 14px;
        }

        .delete-history {
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: #0f0f0f;
        }

        .top-bar {
            padding: 12px 16px;
            background: #0f0f0f;
            border-bottom: 1px solid #2c2c2e;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .menu-btn {
            background: #1c1c1e;
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
        }

        .logo-area {
            font-weight: 600;
            font-size: 18px;
            flex: 1;
        }

        .nav-btn {
            background: #2c2c2e;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 90px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 100%;
            position: relative;
        }

        .message.user {
            justify-content: flex-end;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 32px;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #2b4f7c;
            order: 2;
        }

        .bubble {
            background: #1e1e20;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.45;
            font-size: 15px;
            max-width: 85%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .bubble {
            background: #2b4f7c;
        }

        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            justify-content: flex-end;
        }
        .edit-btn, .regenerate-btn {
            background: #2c2c2e;
            border: none;
            color: #aaa;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 16px;
            cursor: pointer;
        }
        .edit-btn:hover, .regenerate-btn:hover {
            background: #3a3a3c;
            color: white;
        }
        .copy-btn {
            background: #3a3a3c;
            border: none;
            color: #ccc;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 6px;
            display: inline-block;
        }
        .edit-textarea {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid #4a6e8c;
            color: white;
            padding: 8px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
        }
        .edit-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .save-edit-btn, .cancel-edit-btn {
            background: #2b4f7c;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
        }
        .cancel-edit-btn {
            background: #3a3a3c;
        }

        .input-area {
            background: #0f0f0f;
            border-top: 1px solid #2c2c2e;
            padding: 10px 12px 16px 12px;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #1c1c1e;
            border-radius: 30px;
            padding: 4px 10px;
        }

        .file-label {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #8e8e93;
            padding: 6px;
        }

        #fileInput {
            display: none;
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 10px 4px;
            max-height: 100px;
            font-family: inherit;
            resize: none;
        }

        .message-input:focus {
            outline: none;
        }

        .send-btn {
            background: #2b4f7c;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:disabled {
            opacity: 0.5;
        }

        .file-preview-badge {
            background: #1c1c1e;
            border-radius: 20px;
            padding: 4px 12px;
            margin-top: 6px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .remove-file {
            background: none;
            border: none;
            color: #ff453a;
            font-size: 16px;
            cursor: pointer;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #2b4f7c;
            border-radius: 8px;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        @media (min-width: 768px) {
            .sidebar {
                transform: translateX(0);
                position: relative;
            }
            .overlay {
                display: none !important;
            }
            .menu-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
    </div>
    <div class="history-list" id="historyList"></div>
    <div style="padding: 14px; font-size: 10px; color: #5c5c5e; text-align: center; border-top:1px solid #2c2c2e;">
        API Key 本地存储
    </div>
</div>
<div class="overlay" id="overlay"></div>

<div class="main">
    <div class="top-bar">
        <button class="menu-btn" id="menuToggle">☰</button>
        <div class="logo-area">DeepSeek 完整文件版</div>
        <button class="nav-btn" id="scrollTopBtn" title="回到顶部">↑</button>
        <button class="nav-btn" id="scrollBottomBtn" title="跳到底部">↓</button>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="message assistant">
            <div class="avatar">🤖</div>
            <div class="bubble">✨ 文件完整读取版<br>• 上传文件不再截断，完整发送给DeepSeek<br>• 界面只显示文件标记，不显示原文<br>• 支持大文件（会提示token消耗）</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <label class="file-label" title="上传文件">📎
                <input type="file" id="fileInput" accept=".txt,.md,.json,.csv,.js,.py,.html,.css,.xml,.pdf">
            </label>
            <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <div id="filePreviewArea" style="min-height: 28px;"></div>
    </div>
</div>

<script>
    // ========== 配置 ==========
    let API_KEY = localStorage.getItem('deepseek_api_key');
    if (!API_KEY) {
        let inputKey = prompt('🔑 输入 DeepSeek API Key (platform.deepseek.com)\n密钥仅存本地，安全可靠');
        if (inputKey?.trim()) {
            API_KEY = inputKey.trim();
            localStorage.setItem('deepseek_api_key', API_KEY);
        } else {
            API_KEY = '';
            alert('未输入 API Key，对话无法发送');
        }
    }

    const DEEPSEEK_URL = 'https://api.deepseek.com/v1/chat/completions';
    const MODEL = 'deepseek-chat';
    
    let conversations = [];
    let currentId = null;
    let isGenerating = false;
    let pendingFile = null;
    let autoScrollEnabled = true;
    let scrollTimeout = null;
    
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuToggle = document.getElementById('menuToggle');
    const newChatBtn = document.getElementById('newChatBtn');
    const historyList = document.getElementById('historyList');
    const msgContainer = document.getElementById('messagesContainer');
    const msgInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const filePreviewArea = document.getElementById('filePreviewArea');
    const scrollTopBtn = document.getElementById('scrollTopBtn');
    const scrollBottomBtn = document.getElementById('scrollBottomBtn');
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatLines(text) {
        if (!text) return '';
        return escapeHtml(text).replace(/\n/g, '<br>');
    }
    
    function saveData() {
        localStorage.setItem('deepseek_conversations', JSON.stringify(conversations));
    }
    
    function loadData() {
        let raw = localStorage.getItem('deepseek_conversations');
        if (raw) {
            try {
                conversations = JSON.parse(raw);
                if (!Array.isArray(conversations)) conversations = [];
                conversations.forEach(c => { if (!c.messages) c.messages = []; });
            } catch(e) { conversations = []; }
        }
        if (!conversations.length) {
            let newId = Date.now().toString();
            conversations = [{ id: newId, title: '新对话', messages: [] }];
        }
        if (!currentId || !conversations.find(c => c.id === currentId)) {
            currentId = conversations[0].id;
        }
    }
    
    function renderSidebar() {
        if (!historyList) return;
        historyList.innerHTML = '';
        for (let conv of conversations) {
            let div = document.createElement('div');
            div.className = 'history-item';
            if (conv.id === currentId) div.classList.add('active');
            let title = conv.title;
            if (!title || title === '新对话') {
                let firstMsg = conv.messages.find(m => m.role === 'user');
                title = firstMsg ? firstMsg.content.slice(0, 24) : '新对话';
                conv.title = title;
            }
            div.innerHTML = `<span class="history-title">${escapeHtml(title)}</span><button class="delete-history" data-id="${conv.id}">🗑</button>`;
            div.querySelector('.delete-history').onclick = (e) => {
                e.stopPropagation();
                deleteConv(conv.id);
            };
            div.onclick = () => switchConv(conv.id);
            historyList.appendChild(div);
        }
    }
    
    function deleteConv(id) {
        if (conversations.length === 1) { alert('至少保留一个对话'); return; }
        conversations = conversations.filter(c => c.id !== id);
        if (currentId === id) currentId = conversations[0].id;
        saveData();
        renderSidebar();
        renderMessages();
    }
    
    function switchConv(id) {
        if (isGenerating) { alert('请等待回复完成'); return; }
        currentId = id;
        renderSidebar();
        renderMessages();
        if (window.innerWidth < 768) closeSidebar();
    }
    
    function renderMessages() {
        let conv = conversations.find(c => c.id === currentId);
        if (!conv) return;
        msgContainer.innerHTML = '';
        if (conv.messages.length === 0) {
            msgContainer.innerHTML = `<div class="message assistant"><div class="avatar">🤖</div><div class="bubble">📄 上传文件后，我会完整读取内容并回答。界面只显示文件标记，不显示原文。</div></div>`;
        } else {
            for (let i = 0; i < conv.messages.length; i++) {
                const msg = conv.messages[i];
                let div = document.createElement('div');
                div.className = `message ${msg.role}`;
                let avatar = msg.role === 'user' ? '👤' : '🤖';
                let formatted = formatLines(msg.content);
                div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble" data-msg-idx="${i}">${formatted}</div>`;
                const bubble = div.querySelector('.bubble');
                if (msg.role === 'assistant' && msg.content) {
                    let copyBtn = document.createElement('button');
                    copyBtn.innerText = '📋 复制';
                    copyBtn.className = 'copy-btn';
                    copyBtn.onclick = (e) => { e.stopPropagation(); copyToClip(msg.content); };
                    bubble.appendChild(copyBtn);
                }
                if (msg.role === 'user') {
                    let actionDiv = document.createElement('div');
                    actionDiv.className = 'message-actions';
                    let editBtn = document.createElement('button');
                    editBtn.innerText = '✏️ 编辑';
                    editBtn.className = 'edit-btn';
                    editBtn.onclick = (e) => {
                        e.stopPropagation();
                        enableEditMode(bubble, msg.content, i);
                    };
                    let regenBtn = document.createElement('button');
                    regenBtn.innerText = '🔄 重新生成';
                    regenBtn.className = 'regenerate-btn';
                    regenBtn.onclick = (e) => {
                        e.stopPropagation();
                        regenerateAnswer(i);
                    };
                    actionDiv.appendChild(editBtn);
                    actionDiv.appendChild(regenBtn);
                    bubble.appendChild(actionDiv);
                }
                msgContainer.appendChild(div);
            }
        }
        scrollToBottom();
    }
    
    function enableEditMode(bubbleElement, originalContent, messageIndex) {
        if (isGenerating) { alert('请等待当前回复完成'); return; }
        const textarea = document.createElement('textarea');
        textarea.value = originalContent;
        textarea.className = 'edit-textarea';
        textarea.rows = 3;
        const actionDiv = document.createElement('div');
        actionDiv.className = 'edit-actions';
        const saveBtn = document.createElement('button');
        saveBtn.innerText = '✓ 保存并重答';
        saveBtn.className = 'save-edit-btn';
        const cancelBtn = document.createElement('button');
        cancelBtn.innerText = '✗ 取消';
        cancelBtn.className = 'cancel-edit-btn';
        actionDiv.appendChild(saveBtn);
        actionDiv.appendChild(cancelBtn);
        
        bubbleElement.innerHTML = '';
        bubbleElement.appendChild(textarea);
        bubbleElement.appendChild(actionDiv);
        
        saveBtn.onclick = async () => {
            const newText = textarea.value.trim();
            if (!newText) { alert('内容不能为空'); return; }
            let conv = conversations.find(c => c.id === currentId);
            if (conv && conv.messages[messageIndex] && conv.messages[messageIndex].role === 'user') {
                conv.messages[messageIndex].content = newText;
                while (conv.messages.length > messageIndex + 1) {
                    conv.messages.pop();
                }
                saveData();
                renderMessages();
                if (!isGenerating) {
                    await generateForUserIndex(messageIndex);
                }
            }
        };
        cancelBtn.onclick = () => { renderMessages(); };
    }
    
    async function regenerateAnswer(userMsgIndex) {
        if (isGenerating) { alert('请等待回复完成'); return; }
        let conv = conversations.find(c => c.id === currentId);
        if (!conv || conv.messages[userMsgIndex]?.role !== 'user') return;
        while (conv.messages.length > userMsgIndex + 1) {
            conv.messages.pop();
        }
        saveData();
        renderMessages();
        await generateForUserIndex(userMsgIndex);
    }
    
    async function generateForUserIndex(userMsgIndex) {
        if (isGenerating) return;
        let conv = conversations.find(c => c.id === currentId);
        if (!conv || conv.messages[userMsgIndex]?.role !== 'user') return;
        
        conv.messages.push({ role: 'assistant', content: '' });
        saveData();
        renderMessages();
        
        const assistantBubbles = document.querySelectorAll('.message.assistant .bubble');
        let targetBubble = assistantBubbles[assistantBubbles.length - 1];
        if (!targetBubble) return;
        
        let apiMessages = [];
        apiMessages.push({ role: 'system', content: '你是DeepSeek助手，回答时请使用换行分段让阅读更舒适。如果用户上传了文件，根据文件内容回答，不要展示文件原文。直接给出清晰、分段的结果。' });
        for (let i = 0; i <= userMsgIndex; i++) {
            let msg = conv.messages[i];
            apiMessages.push({ role: msg.role, content: msg.content });
        }
        
        isGenerating = true;
        sendBtn.disabled = true;
        
        try {
            let response = await fetch(DEEPSEEK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: MODEL, messages: apiMessages, stream: true, temperature: 0.6, max_tokens: 4096 })
            });
            if (!response.ok) throw new Error(`API ${response.status}`);
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullAnswer = '';
            let buffer = '';
            let lastUpdate = 0;
            
            targetBubble.innerHTML = '<span class="status-indicator"></span> 生成中...';
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (let line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed === 'data: [DONE]') continue;
                    if (trimmed.startsWith('data: ')) {
                        try {
                            const json = JSON.parse(trimmed.slice(6));
                            const delta = json.choices[0]?.delta?.content || '';
                            if (delta) {
                                fullAnswer += delta;
                                const now = Date.now();
                                if (now - lastUpdate > 30) {
                                    targetBubble.innerHTML = formatLines(fullAnswer);
                                    lastUpdate = now;
                                }
                                if (autoScrollEnabled) scrollToBottom();
                            }
                        } catch(e) {}
                    }
                }
            }
            targetBubble.innerHTML = formatLines(fullAnswer || '(空回复)');
            let copyBtn = document.createElement('button');
            copyBtn.innerText = '📋 复制';
            copyBtn.className = 'copy-btn';
            copyBtn.onclick = (e) => { e.stopPropagation(); copyToClip(fullAnswer); };
            targetBubble.appendChild(copyBtn);
            
            let currentConv = conversations.find(c => c.id === currentId);
            if (currentConv && currentConv.messages[currentConv.messages.length-1]?.role === 'assistant') {
                currentConv.messages[currentConv.messages.length-1].content = fullAnswer;
                saveData();
            }
        } catch (err) {
            targetBubble.innerHTML = formatLines(`❌ 请求失败: ${err.message}`);
            let copyBtn = document.createElement('button');
            copyBtn.innerText = '📋 复制';
            copyBtn.className = 'copy-btn';
            copyBtn.onclick = (e) => { e.stopPropagation(); copyToClip(`错误: ${err.message}`); };
            targetBubble.appendChild(copyBtn);
            let currentConv = conversations.find(c => c.id === currentId);
            if (currentConv && currentConv.messages[currentConv.messages.length-1]?.role === 'assistant') {
                currentConv.messages[currentConv.messages.length-1].content = `❌ 请求失败: ${err.message}`;
                saveData();
            }
        } finally {
            isGenerating = false;
            sendBtn.disabled = false;
            if (autoScrollEnabled) scrollToBottom();
        }
    }
    
    async function copyToClip(text) {
        try {
            await navigator.clipboard.writeText(text);
            alert('✅ 已复制');
        } catch(e) {
            let ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            alert('✅ 已复制');
        }
    }
    
    // ========== 修复：完整读取文件，不截断 ==========
    function onFileSelected(file) {
        if (!file) return;
        // 检查文件大小（提示用，不强制限制）
        const fileSizeKB = file.size / 1024;
        if (fileSizeKB > 500) {
            if (!confirm(`文件较大（${fileSizeKB.toFixed(0)} KB），可能消耗较多token。是否继续？`)) {
                return;
            }
        }
        
        let reader = new FileReader();
        reader.onload = (e) => {
            let content = e.target.result;
            // 完整保存，不截断
            pendingFile = { name: file.name, content: content };
            showFileBadge(file.name);
        };
        reader.onerror = () => alert('文件读取失败');
        reader.readAsText(file, 'UTF-8');
    }
    
    function showFileBadge(name) {
        filePreviewArea.innerHTML = `<div class="file-preview-badge">📎 已附加: ${escapeHtml(name)} <button class="remove-file" id="clearFileBtn">✖</button></div>`;
        document.getElementById('clearFileBtn')?.addEventListener('click', () => { pendingFile = null; filePreviewArea.innerHTML = ''; fileInput.value = ''; });
    }
    function clearPreview() {
        filePreviewArea.innerHTML = '';
        fileInput.value = '';
    }
    
    // ========== 修复：发送时不截断文件内容 ==========
    async function sendMessage() {
        if (isGenerating) { alert('请等待回复完成'); return; }
        let userText = msgInput.value.trim();
        if (!userText && !pendingFile) return;
        
        let finalDisplayText = userText;
        let fileContentForApi = '';
        if (pendingFile) {
            finalDisplayText = userText ? `${userText}\n📎 [文件: ${pendingFile.name}]` : `📎 [文件: ${pendingFile.name}]`;
            // 完整内容，不截断
            fileContentForApi = `\n\n===== 上传文件 "${pendingFile.name}" 完整内容 =====\n${pendingFile.content}\n===== 文件内容结束 =====\n请根据文件内容回答问题。`;
            pendingFile = null;
            clearPreview();
        }
        
        let conv = conversations.find(c => c.id === currentId);
        let userMsgIndex = conv.messages.length;
        let finalContentForStorage = finalDisplayText;
        let finalContentForApi = finalDisplayText + fileContentForApi;
        
        conv.messages.push({ role: 'user', content: finalContentForStorage });
        saveData();
        renderMessages();
        
        msgInput.value = '';
        msgInput.style.height = 'auto';
        
        let originalContent = conv.messages[userMsgIndex].content;
        conv.messages[userMsgIndex].content = finalContentForApi;
        await generateForUserIndex(userMsgIndex);
        conv.messages[userMsgIndex].content = originalContent;
        saveData();
        renderMessages();
        
        if (conv.messages.filter(m => m.role === 'user').length === 1) {
            conv.title = finalDisplayText.slice(0, 26) || '新对话';
            saveData();
            renderSidebar();
        }
    }
    
    function scrollToTop() { 
        autoScrollEnabled = false;
        msgContainer.scrollTo({ top: 0, behavior: 'smooth' });
        setTimeout(() => { autoScrollEnabled = true; }, 500);
    }
    function scrollToBottom() { msgContainer.scrollTop = msgContainer.scrollHeight; }
    
    function autoResize() {
        msgInput.style.height = 'auto';
        msgInput.style.height = Math.min(100, msgInput.scrollHeight) + 'px';
    }
    
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); }
    
    function newConversation() {
        if (isGenerating) { alert('请等待回复完成'); return; }
        let newId = Date.now().toString();
        conversations.unshift({ id: newId, title: '新对话', messages: [] });
        currentId = newId;
        saveData();
        renderSidebar();
        renderMessages();
        if (window.innerWidth < 768) closeSidebar();
    }
    
    function onUserScroll() {
        if (isGenerating) {
            autoScrollEnabled = false;
            if (scrollTimeout) clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => { autoScrollEnabled = true; }, 3000);
        }
    }
    
    menuToggle.addEventListener('click', () => { if (sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); });
    overlay.addEventListener('click', closeSidebar);
    newChatBtn.addEventListener('click', newConversation);
    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    msgInput.addEventListener('input', autoResize);
    fileInput.addEventListener('change', (e) => { if (e.target.files[0]) onFileSelected(e.target.files[0]); });
    scrollTopBtn.addEventListener('click', scrollToTop);
    scrollBottomBtn.addEventListener('click', scrollToBottom);
    msgContainer.addEventListener('scroll', onUserScroll);
    
    loadData();
    renderSidebar();
