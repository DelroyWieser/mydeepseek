<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>DeepSeek 智能助手 · 极速滑动版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f0f0f;
            color: #e4e4e7;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: #1a1a1a;
            border-right: 1px solid #2c2c2e;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            z-index: 30;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 12px rgba(0,0,0,0.5);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            z-index: 20;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #2c2c2e;
        }

        .new-chat-btn {
            width: 100%;
            background: #2c2c2e;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            background: #1f1f1f;
            border: 1px solid #2c2c2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item.active {
            background: #2d2d30;
            border-color: #4a6e8c;
        }

        .history-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            font-size: 14px;
        }

        .delete-history {
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: #0f0f0f;
        }

        .top-bar {
            padding: 12px 16px;
            background: #0f0f0f;
            border-bottom: 1px solid #2c2c2e;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .menu-btn {
            background: #1c1c1e;
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
        }

        .logo-area {
            font-weight: 600;
            font-size: 18px;
            flex: 1;
        }

        .scroll-top-btn {
            background: #2c2c2e;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 90px 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 100%;
        }

        .message.user {
            justify-content: flex-end;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 34px;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #2b4f7c;
            order: 2;
        }

        .bubble {
            background: #1e1e20;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 15px;
            max-width: 85%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .bubble {
            background: #2b4f7c;
        }

        .copy-btn {
            background: #2c2c2e;
            border: none;
            color: #aaa;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 6px;
        }

        .bubble-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 6px;
        }

        .input-area {
            background: #0f0f0f;
            border-top: 1px solid #2c2c2e;
            padding: 12px 16px 18px 16px;
            position: sticky;
            bottom: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #1c1c1e;
            border-radius: 32px;
            padding: 6px 12px;
        }

        .file-label {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            line-height: 1;
            color: #8e8e93;
            padding: 6px;
        }

        #fileInput {
            display: none;
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 10px 4px;
            max-height: 120px;
            font-family: inherit;
            resize: none;
        }

        .message-input:focus {
            outline: none;
        }

        .send-btn {
            background: #2b4f7c;
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
        }

        .send-btn:disabled {
            opacity: 0.5;
        }

        .file-preview-badge {
            background: #1c1c1e;
            border-radius: 24px;
            padding: 5px 12px;
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .remove-file {
            background: none;
            border: none;
            color: #ff453a;
            font-size: 18px;
            cursor: pointer;
        }

        .typing-cursor::after {
            content: '▊';
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (min-width: 768px) {
            .sidebar {
                transform: translateX(0);
                position: relative;
            }
            .overlay {
                display: none !important;
            }
            .menu-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
    </div>
    <div class="history-list" id="historyList"></div>
    <div style="padding: 16px; font-size: 10px; color: #5c5c5e; text-align: center; border-top:1px solid #2c2c2e;">
        API Key 本地存储
    </div>
</div>
<div class="overlay" id="overlay"></div>

<div class="main">
    <div class="top-bar">
        <button class="menu-btn" id="menuToggle">☰</button>
        <div class="logo-area">DeepSeek 助手</div>
        <button class="scroll-top-btn" id="scrollTopBtn" title="回到顶部">↑</button>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="message assistant">
            <div class="avatar">🤖</div>
            <div class="bubble">你好！我是 DeepSeek，支持上传文件。<br>✨ 生成回复时你可以自由滑动，完全不影响！<br>📌 点击 ↑ 回到顶部，点击复制按钮可复制内容。</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <label class="file-label" title="上传文件">📎
                <input type="file" id="fileInput" accept=".txt,.md,.json,.csv,.js,.py,.html,.css,.xml">
            </label>
            <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <div id="filePreviewArea" style="min-height: 32px;"></div>
    </div>
</div>

<script>
    // ========== 配置 ==========
    let API_KEY = localStorage.getItem('deepseek_api_key');
    if (!API_KEY) {
        const inputKey = prompt('🔐 请输入你的 DeepSeek API Key（从 platform.deepseek.com 获取）:\n\n密钥仅保存在浏览器本地。');
        if (inputKey && inputKey.trim()) {
            API_KEY = inputKey.trim();
            localStorage.setItem('deepseek_api_key', API_KEY);
        } else {
            API_KEY = '';
            alert('未输入 API Key，对话功能将不可用');
        }
    }

    const DEEPSEEK_URL = 'https://api.deepseek.com/v1/chat/completions';
    const MODEL = 'deepseek-chat';

    let conversations = [];
    let currentConversationId = null;
    let isGenerating = false;
    let pendingFile = null;
    let pendingUpdate = null;      // requestAnimationFrame 句柄
    let pendingBubbleContent = ''; // 待更新的内容
    let currentBubbleElement = null; // 当前正在更新的气泡DOM
    let currentAssistantIndex = -1;   // 当前消息索引

    // DOM
    const sidebarEl = document.getElementById('sidebar');
    const overlayEl = document.getElementById('overlay');
    const menuToggle = document.getElementById('menuToggle');
    const newChatBtn = document.getElementById('newChatBtn');
    const historyListEl = document.getElementById('historyList');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const filePreviewArea = document.getElementById('filePreviewArea');
    const scrollTopBtn = document.getElementById('scrollTopBtn');

    // 辅助函数
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
        });
    }

    function formatWithBreaks(text) {
        if (!text) return '';
        return escapeHtml(text).replace(/\n/g, '<br>');
    }

    function saveConversations() {
        localStorage.setItem('deepseek_conversations', JSON.stringify(conversations));
    }

    function loadConversations() {
        const raw = localStorage.getItem('deepseek_conversations');
        if (raw) {
            try {
                conversations = JSON.parse(raw);
                if (!Array.isArray(conversations)) conversations = [];
                conversations.forEach(c => { if (!c.messages) c.messages = []; });
            } catch(e) { conversations = []; }
        }
        if (conversations.length === 0) {
            const newId = Date.now().toString();
            conversations.push({ id: newId, title: '新对话', messages: [], createdAt: Date.now() });
            currentConversationId = newId;
            saveConversations();
        } else {
            if (!currentConversationId || !conversations.find(c => c.id === currentConversationId)) {
                currentConversationId = conversations[0].id;
            }
        }
    }

    function renderHistory() {
        if (!historyListEl) return;
        historyListEl.innerHTML = '';
        for (let conv of conversations) {
            const div = document.createElement('div');
            div.className = 'history-item';
            if (currentConversationId === conv.id) div.classList.add('active');
            const titleSpan = document.createElement('span');
            titleSpan.className = 'history-title';
            let displayTitle = conv.title;
            if (!displayTitle || displayTitle === '新对话') {
                const firstUserMsg = conv.messages.find(m => m.role === 'user');
                displayTitle = firstUserMsg ? firstUserMsg.content.slice(0, 24) : '新对话';
                conv.title = displayTitle;
            }
            titleSpan.innerText = displayTitle;
            const delBtn = document.createElement('button');
            delBtn.innerText = '🗑';
            delBtn.className = 'delete-history';
            delBtn.onclick = (e) => { e.stopPropagation(); deleteConversation(conv.id); };
            div.appendChild(titleSpan);
            div.appendChild(delBtn);
            div.onclick = () => switchConversation(conv.id);
            historyListEl.appendChild(div);
        }
    }

    function deleteConversation(id) {
        if (conversations.length === 1) { alert('至少保留一个对话'); return; }
        conversations = conversations.filter(c => c.id !== id);
        if (currentConversationId === id) currentConversationId = conversations[0].id;
        saveConversations();
        renderHistory();
        renderCurrentChat();
    }

    function switchConversation(id) {
        if (isGenerating) { alert('请等待回复完成后再切换'); return; }
        currentConversationId = id;
        renderHistory();
        renderCurrentChat();
        if (window.innerWidth < 768) closeSidebar();
    }

    // 使用 requestAnimationFrame 更新气泡（高频但不会阻塞滚动）
    function scheduleBubbleUpdate(content) {
        pendingBubbleContent = content;
        if (pendingUpdate) return;
        pendingUpdate = requestAnimationFrame(() => {
            if (currentBubbleElement && currentAssistantIndex >= 0) {
                const conv = conversations.find(c => c.id === currentConversationId);
                if (conv && conv.messages[currentAssistantIndex]) {
                    conv.messages[currentAssistantIndex].content = pendingBubbleContent;
                    const formattedHtml = formatWithBreaks(pendingBubbleContent);
                    let actionDiv = currentBubbleElement.querySelector('.bubble-actions');
                    currentBubbleElement.innerHTML = formattedHtml;
                    if (actionDiv) currentBubbleElement.appendChild(actionDiv);
                    else {
                        const newAction = document.createElement('div');
                        newAction.className = 'bubble-actions';
                        const copyBtn = document.createElement('button');
                        copyBtn.innerText = '📋 复制';
                        copyBtn.className = 'copy-btn';
                        copyBtn.onclick = (e) => {
                            e.stopPropagation();
                            copyToClipboard(pendingBubbleContent);
                        };
                        newAction.appendChild(copyBtn);
                        currentBubbleElement.appendChild(newAction);
                    }
                    if (!currentBubbleElement.classList.contains('typing-cursor')) {
                        currentBubbleElement.classList.add('typing-cursor');
                    }
                }
            }
            pendingUpdate = null;
        });
    }

    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            alert('✅ 已复制');
        } catch(err) {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            alert('✅ 已复制');
        }
    }

    function addMessageToCurrent(role, content, saveImmediately = true) {
        const conv = conversations.find(c => c.id === currentConversationId);
        if (!conv) return;
        conv.messages.push({ role, content, timestamp: Date.now() });
        if (saveImmediately) saveConversations();
        if (role === 'user' && conv.messages.filter(m => m.role === 'user').length === 1) {
            let newTitle = content.slice(0, 28);
            conv.title = newTitle || '新对话';
            saveConversations();
            renderHistory();
        }
        renderCurrentChat();
    }

    function renderCurrentChat() {
        const conv = conversations.find(c => c.id === currentConversationId);
        if (!conv) return;
        const wasAtBottom = messagesContainer.scrollHeight - messagesContainer.scrollTop - messagesContainer.clientHeight < 100;
        messagesContainer.innerHTML = '';
        if (conv.messages.length === 0) {
            messagesContainer.innerHTML = '<div class="message assistant"><div class="avatar">🤖</div><div class="bubble">有什么可以帮你的？上传文件或直接提问～</div></div>';
        } else {
            conv.messages.forEach((msg, idx) => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.role}`;
                const avatar = msg.role === 'user' ? '👤' : '🤖';
                const formattedContent = formatWithBreaks(msg.content);
                msgDiv.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${formattedContent}</div>`;
                if (msg.role === 'assistant' && msg.content && msg.content.length > 0) {
                    const bubbleDiv = msgDiv.querySelector('.bubble');
                    const actionDiv = document.createElement('div');
                    actionDiv.className = 'bubble-actions';
                    const copyBtn = document.createElement('button');
                    copyBtn.innerText = '📋 复制';
                    copyBtn.className = 'copy-btn';
                    copyBtn.onclick = (e) => { e.stopPropagation(); copyToClipboard(msg.content); };
                    actionDiv.appendChild(copyBtn);
                    bubbleDiv.appendChild(actionDiv);
                }
                messagesContainer.appendChild(msgDiv);
            });
        }
        if (wasAtBottom) scrollToBottom();
    }

    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function scrollToTop() {
        messagesContainer.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function autoResizeTextarea() {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(100, messageInput.scrollHeight) + 'px';
    }

    function closeSidebar() { sidebarEl.classList.remove('open'); overlayEl.classList.remove('show'); }
    function openSidebar() { sidebarEl.classList.add('open'); overlayEl.classList.add('show'); }

    function newConversation() {
        if (isGenerating) { alert('请等待回复完成'); return; }
        const newId = Date.now().toString();
        conversations.unshift({ id: newId, title: '新对话', messages: [], createdAt: Date.now() });
        currentConversationId = newId;
        saveConversations();
        renderHistory();
        renderCurrentChat();
        if (window.innerWidth < 768) closeSidebar();
    }

    function clearFilePreview() {
        filePreviewArea.innerHTML = '';
        pendingFile = null;
        fileInput.value = '';
    }

    function showFilePreview(name) {
        filePreviewArea.innerHTML = `<div class="file-preview-badge">📄 已附加: ${escapeHtml(name)} <button class="remove-file" id="removeFileBtn">✖</button></div>`;
        const removeBtn = document.getElementById('removeFileBtn');
        if (removeBtn) removeBtn.onclick = () => { pendingFile = null; clearFilePreview(); };
    }

    function handleFileUpload(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            let content = e.target.result;
            if (content.length > 8000) content = content.slice(0, 8000) + '\n...(截断)';
            pendingFile = { name: file.name, content: content };
            showFilePreview(file.name);
        };
        reader.onerror = () => alert('读取失败');
        reader.readAsText(file, 'UTF-8');
    }

    // 核心发送函数：极速流式 + requestAnimationFrame 更新，不阻塞滚动
    async function sendMessageWithFile() {
        if (isGenerating) { alert('请等待回复完成'); return; }
        let userText = messageInput.value.trim();
        if (!userText && !pendingFile) return;

        let finalUserContent = userText;
        let attachedFileInfo = null;
        if (pendingFile) {
            attachedFileInfo = { name: pendingFile.name, content: pendingFile.content };
            finalUserContent = userText ? `${userText}\n📎 [文件: ${pendingFile.name}]` : `📎 [文件: ${pendingFile.name}]`;
            pendingFile = null;
            clearFilePreview();
        }
        if (!finalUserContent) return;

        addMessageToCurrent('user', finalUserContent, true);
        messageInput.value = '';
        autoResizeTextarea();

        const conv = conversations.find(c => c.id === currentConversationId);
        const assistantMsgIndex = conv.messages.length;
        conv.messages.push({ role: 'assistant', content: '' });
        saveConversations();
        renderCurrentChat();
        scrollToBottom();

        // 获取刚创建的气泡元素
        const bubbles = document.querySelectorAll('.message.assistant .bubble');
        currentBubbleElement = bubbles[assistantMsgIndex];
        currentAssistantIndex = assistantMsgIndex;
        if (currentBubbleElement) currentBubbleElement.classList.add('typing-cursor');

        isGenerating = true;
        sendBtn.disabled = true;

        // 构建 API 消息
        const historyMessages = conv.messages.slice(0, -1);
        let apiMessages = [{ role: 'system', content: '你是一个智能助手。回复请使用清晰分段、适当换行，使阅读舒适。' }];
        for (let m of historyMessages) {
            let content = m.content;
            if (m.role === 'user' && attachedFileInfo && m.content.includes(`[文件: ${attachedFileInfo.name}]`)) {
                content = userText + `\n\n[文件上传: ${attachedFileInfo.name}]\n文件内容:\n${attachedFileInfo.content.slice(0, 4000)}`;
            }
            apiMessages.push({ role: m.role, content: content });
        }

        try {
            const response = await fetch(DEEPSEEK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: MODEL, messages: apiMessages, stream: true, temperature: 0.7 })
            });
            if (!response.ok) throw new Error(`API错误 ${response.status}`);

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullContent = '';
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed === 'data: [DONE]') continue;
                    if (trimmed.startsWith('data: ')) {
                        try {
                            const parsed = JSON.parse(trimmed.slice(6));
                            const delta = parsed.choices[0]?.delta?.content || '';
                            if (delta) {
                                fullContent += delta;
                                // 使用 RAF 更新，完全不阻塞滚动
                                scheduleBubbleUpdate(fullContent);
                            }
                        } catch(e) {}
                    }
                }
            }
            if (currentBubbleElement) currentBubbleElement.classList.remove('typing-cursor');
            const finalConv = conversations.find(c => c.id === currentConversationId);
            if (finalConv && finalConv.messages[assistantMsgIndex]) {
                finalConv.messages[assistantMsgIndex].content = fullContent || '(空回复)';
            }
            saveConversations();
            renderCurrentChat();
        } catch (err) {
            const errorMsg = `❌ 请求失败: ${err.message}`;
            const convErr = conversations.find(c => c.id === currentConversationId);
            if (convErr && convErr.messages[assistantMsgIndex]) {
                convErr.messages[assistantMsgIndex].content = errorMsg;
                saveConversations();
                renderCurrentChat();
            }
        } finally {
            isGenerating = false;
            sendBtn.disabled = false;
            if (pendingUpdate) {
                cancelAnimationFrame(pendingUpdate);
                pendingUpdate = null;
            }
            currentBubbleElement = null;
            currentAssistantIndex = -1;
        }
    }

    // 事件绑定
    menuToggle.addEventListener('click', () => { sidebarEl.classList.contains('open') ? closeSidebar() : openSidebar(); });
    overlayEl.addEventListener('click', closeSidebar);
    newChatBtn.addEventListener('click', newConversation);
    sendBtn.addEventListener('click', sendMessageWithFile);
    messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessageWithFile(); } });
    messageInput.addEventListener('input', autoResizeTextarea);
    fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFileUpload(e.target.files[0]); });
    scrollTopBtn.addEventListener('click', scrollToTop);

    loadConversations();
    renderHistory();
    renderCurrentChat();
    autoResizeTextarea();
    if (!API_KEY) setTimeout(() => alert('⚠️ 未设置API Key'), 200);
</script>
