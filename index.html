<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek 聊天</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e4e4e7;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 顶部栏 */
        .top-bar {
            padding: 12px 16px;
            background: #0f0f0f;
            border-bottom: 1px solid #2c2c2e;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menu-btn {
            background: #1c1c1e;
            border: none;
            color: white;
            font-size: 24px;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
        }
        .logo-area { font-weight: 600; font-size: 18px; flex: 1; }
        /* 消息区域 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            gap: 12px;
            max-width: 100%;
        }
        .message.user { justify-content: flex-end; }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 32px;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .message.user .avatar { background: #3a6ea5; order: 2; }
        .bubble {
            background: #1e1e20;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.4;
            font-size: 15px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .message.user .bubble { background: #2b4f7c; }
        /* 底部输入区 */
        .input-area {
            background: #0f0f0f;
            border-top: 1px solid #2c2c2e;
            padding: 12px 16px 20px;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #1c1c1e;
            border-radius: 28px;
            padding: 6px 12px;
        }
        .file-label {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: #8e8e93;
        }
        #fileInput { display: none; }
        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 8px 4px;
            font-family: inherit;
        }
        .message-input:focus { outline: none; }
        .send-btn {
            background: #2b4f7c;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
        }
        .file-preview {
            font-size: 12px;
            color: #8e8e93;
            padding: 6px 12px 0;
        }
        .remove-file {
            background: none;
            border: none;
            color: #ff453a;
            margin-left: 8px;
            cursor: pointer;
        }
        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100%;
            background: #1a1a1a;
            transform: translateX(-100%);
            transition: transform 0.2s;
            z-index: 30;
            display: flex;
            flex-direction: column;
        }
        .sidebar.open { transform: translateX(0); }
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 20;
            display: none;
        }
        .overlay.show { display: block; }
        .sidebar-header { padding: 20px 16px; border-bottom: 1px solid #2c2c2e; }
        .new-chat-btn {
            width: 100%;
            background: #2c2c2e;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
        }
        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .history-item {
            padding: 10px;
            border-radius: 10px;
            background: #1f1f1f;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .delete-history { background: none; border: none; color: #8e8e93; cursor: pointer; }
        @media (min-width: 768px) {
            .sidebar { transform: translateX(0); position: relative; }
            .overlay { display: none !important; }
            .menu-btn { display: none; }
            body { flex-direction: row; }
        }
    </style>
</head>
<body>
<div style="display: flex; width: 100%; height: 100%;">
<div class="sidebar" id="sidebar">
    <div class="sidebar-header"><button class="new-chat-btn" id="newChatBtn">+ 新建对话</button></div>
    <div class="history-list" id="historyList"></div>
</div>
<div class="overlay" id="overlay"></div>
<div style="flex:1; display: flex; flex-direction: column; height: 100%;">
    <div class="top-bar">
        <button class="menu-btn" id="menuToggle">☰</button>
        <div class="logo-area">DeepSeek · 个人助理</div>
    </div>
    <div class="messages-container" id="messagesContainer">
        <div class="message assistant"><div class="avatar">🤖</div><div class="bubble">你好！我是 DeepSeek，支持上传文件（txt、md、json等）。</div></div>
    </div>
    <div class="input-area">
        <div class="input-wrapper">
            <label class="file-label" title="上传文件">📎<input type="file" id="fileInput" accept=".txt,.md,.json,.csv,.js,.py"></label>
            <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <div id="filePreviewArea" class="file-preview"></div>
    </div>
</div>
</div>

<script>
    // ========== 获取 API Key（首次访问时弹窗输入）==========
    let API_KEY = localStorage.getItem('deepseek_api_key');
    if (!API_KEY) {
        let key = prompt('🔑 请输入你的 DeepSeek API Key：\n(可从 platform.deepseek.com 获取)');
        if (key && key.trim()) {
            API_KEY = key.trim();
            localStorage.setItem('deepseek_api_key', API_KEY);
        } else {
            API_KEY = '';
            alert('未输入 API Key，将无法发送消息');
        }
    }

    const DEEPSEEK_URL = 'https://api.deepseek.com/v1/chat/completions';
    
    // 数据结构
    let conversations = [];
    let currentId = null;
    let isGenerating = false;
    let pendingFile = null;

    // DOM
    const msgContainer = document.getElementById('messagesContainer');
    const msgInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const filePreview = document.getElementById('filePreviewArea');
    const historyList = document.getElementById('historyList');
    const newChatBtn = document.getElementById('newChatBtn');
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    // 辅助函数
    function save() { localStorage.setItem('deepseek_chats', JSON.stringify(conversations)); }
    
    function load() {
        let raw = localStorage.getItem('deepseek_chats');
        if (raw) {
            try { conversations = JSON.parse(raw); } catch(e) { conversations = []; }
        }
        if (!conversations.length) {
            conversations = [{ id: Date.now().toString(), title: '新对话', messages: [] }];
        }
        if (!currentId || !conversations.find(c => c.id === currentId)) {
            currentId = conversations[0].id;
        }
        renderHistory();
        renderChat();
    }

    function renderHistory() {
        historyList.innerHTML = '';
        conversations.forEach(conv => {
            let div = document.createElement('div');
            div.className = 'history-item';
            if (conv.id === currentId) div.style.background = '#2d2d30';
            let title = conv.title || (conv.messages[0]?.content?.slice(0,20) || '新对话');
            div.innerHTML = `<span>${escapeHtml(title)}</span><button class="delete-history" data-id="${conv.id}">🗑</button>`;
            div.onclick = (e) => { if(e.target.tagName!='BUTTON') switchChat(conv.id); };
            div.querySelector('.delete-history').onclick = (e) => { e.stopPropagation(); deleteChat(conv.id); };
            historyList.appendChild(div);
        });
    }

    function switchChat(id) { if(!isGenerating) { currentId = id; renderHistory(); renderChat(); closeSidebar(); } }
    
    function deleteChat(id) {
        if(conversations.length === 1) { alert('至少保留一个对话'); return; }
        conversations = conversations.filter(c => c.id !== id);
        if(currentId === id) currentId = conversations[0].id;
        save(); renderHistory(); renderChat();
    }

    function newChat() {
        let newId = Date.now().toString();
        conversations.unshift({ id: newId, title: '新对话', messages: [] });
        currentId = newId;
        save(); renderHistory(); renderChat();
        closeSidebar();
    }

    function renderChat() {
        let conv = conversations.find(c => c.id === currentId);
        if(!conv) return;
        msgContainer.innerHTML = '';
        if(conv.messages.length === 0) {
            msgContainer.innerHTML = '<div class="message assistant"><div class="avatar">🤖</div><div class="bubble">有什么可以帮你的？上传文件或直接提问~</div></div>';
        } else {
            conv.messages.forEach(msg => {
                let div = document.createElement('div');
                div.className = `message ${msg.role}`;
                div.innerHTML = `<div class="avatar">${msg.role === 'user' ? '👤' : '🤖'}</div><div class="bubble">${escapeHtml(msg.content)}</div>`;
                msgContainer.appendChild(div);
            });
        }
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function addMessage(role, content, saveNow=true) {
        let conv = conversations.find(c => c.id === currentId);
        if(conv) {
            conv.messages.push({ role, content });
            if(saveNow) save();
            if(role === 'user' && conv.messages.filter(m=>m.role==='user').length === 1) {
                conv.title = content.slice(0, 25);
                renderHistory();
            }
            renderChat();
        }
    }

    async function sendMessage() {
        if(isGenerating) { alert('请等待回复完成'); return; }
        let userText = msgInput.value.trim();
        if(!userText && !pendingFile) return;
        
        let finalContent = userText;
        if(pendingFile) {
            finalContent = userText + `\n\n[文件: ${pendingFile.name}]\n内容:\n${pendingFile.content.slice(0, 2000)}`;
            pendingFile = null;
            filePreview.innerHTML = '';
            fileInput.value = '';
        }
        if(!finalContent) return;
        
        addMessage('user', finalContent);
        msgInput.value = '';
        msgInput.style.height = 'auto';
        
        // 占位AI消息
        let conv = conversations.find(c => c.id === currentId);
        let aiMsgIndex = conv.messages.length;
        conv.messages.push({ role: 'assistant', content: '' });
        save();
        renderChat();
        
        isGenerating = true;
        sendBtn.disabled = true;
        
        let apiMessages = conv.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
        apiMessages.unshift({ role: 'system', content: '你是DeepSeek助手，根据上下文和文件内容回答问题。' });
        
        try {
            let res = await fetch(DEEPSEEK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: 'deepseek-chat', messages: apiMessages, stream: true })
            });
            if(!res.ok) throw new Error(`HTTP ${res.status}`);
            
            let reader = res.body.getReader();
            let decoder = new TextDecoder();
            let full = '';
            let buffer = '';
            while(true) {
                let { done, value } = await reader.read();
                if(done) break;
                buffer += decoder.decode(value, { stream: true });
                let lines = buffer.split('\n');
                buffer = lines.pop();
                for(let line of lines) {
                    if(line.startsWith('data: ')) {
                        let data = line.slice(6);
                        if(data === '[DONE]') continue;
                        try {
                            let json = JSON.parse(data);
                            let delta = json.choices[0]?.delta?.content || '';
                            if(delta) {
                                full += delta;
                                let curr = conversations.find(c => c.id === currentId);
                                if(curr && curr.messages[aiMsgIndex]) {
                                    curr.messages[aiMsgIndex].content = full;
                                    let bubbles = document.querySelectorAll('.message.assistant .bubble');
                                    if(bubbles[aiMsgIndex]) bubbles[aiMsgIndex].innerHTML = escapeHtml(full);
                                }
                                msgContainer.scrollTop = msgContainer.scrollHeight;
                            }
                        } catch(e) {}
                    }
                }
            }
            save();
            renderChat();
        } catch(err) {
            let curr = conversations.find(c => c.id === currentId);
            if(curr && curr.messages[aiMsgIndex]) curr.messages[aiMsgIndex].content = `错误: ${err.message}`;
            save(); renderChat();
        }
        isGenerating = false;
        sendBtn.disabled = false;
    }
    
    function handleFile(file) {
        let reader = new FileReader();
        reader.onload = (e) => {
            let content = e.target.result;
            if(content.length > 5000) content = content.slice(0, 5000) + '\n...(已截断)';
            pendingFile = { name: file.name, content: content };
            filePreview.innerHTML = `<span>📄 ${escapeHtml(file.name)}</span><button class="remove-file">✖</button>`;
            document.querySelector('.remove-file')?.addEventListener('click', () => { pendingFile = null; filePreview.innerHTML = ''; fileInput.value = ''; });
        };
        reader.readAsText(file, 'UTF-8');
    }
    
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, function(m){ return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'; }); }
    function autoResize() { this.style.height = 'auto'; this.style.height = Math.min(100, this.scrollHeight) + 'px'; }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); }
    
    msgInput.addEventListener('input', autoResize);
    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    fileInput.addEventListener('change', (e) => { if(e.target.files[0]) handleFile(e.target.files[0]); });
    newChatBtn.addEventListener('click', newChat);
    menuToggle.addEventListener('click', () => { if(sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); });
    overlay.addEventListener('click', closeSidebar);
    
    load();
</script>
</body>
</html>
