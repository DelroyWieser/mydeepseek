<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DeepSeek 测试版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto;
            background: #0f0f0f;
            color: #e4e4e7;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            padding: 12px 16px;
            background: #0f0f0f;
            border-bottom: 1px solid #2c2c2e;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .menu-btn, .search-btn, .nav-btn {
            background: #1c1c1e;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
        }
        .logo { flex: 1; font-weight: 600; }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            gap: 10px;
        }
        .message.user { justify-content: flex-end; }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 32px;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .message.user .avatar { background: #2b4f7c; order: 2; }
        .bubble {
            background: #1e1e20;
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 80%;
            white-space: pre-wrap;
        }
        .message.user .bubble { background: #2b4f7c; }
        .input-area {
            padding: 12px 16px 20px;
            border-top: 1px solid #2c2c2e;
            background: #0f0f0f;
        }
        .input-wrapper {
            display: flex;
            gap: 10px;
            background: #1c1c1e;
            border-radius: 30px;
            padding: 6px 12px;
        }
        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 8px 4px;
            font-family: inherit;
        }
        .message-input:focus { outline: none; }
        .send-btn {
            background: #2b4f7c;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100%;
            background: #1a1a1a;
            transform: translateX(-100%);
            transition: transform 0.2s;
            z-index: 30;
            padding: 20px;
        }
        .sidebar.open { transform: translateX(0); }
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 20;
            display: none;
        }
        .overlay.show { display: block; }
        .new-chat-btn {
            width: 100%;
            background: #2c2c2e;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .history-item {
            padding: 10px;
            background: #1f1f1f;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        @media (min-width: 768px) {
            .sidebar { transform: translateX(0); position: relative; }
            .overlay { display: none !important; }
            .menu-btn { display: none; }
        }
    </style>
</head>
<body>
<div class="sidebar" id="sidebar">
    <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
    <div id="historyList"></div>
</div>
<div class="overlay" id="overlay"></div>

<div class="main" style="flex:1; display:flex; flex-direction:column; height:100%;">
    <div class="top-bar">
        <button class="menu-btn" id="menuToggle">☰</button>
        <div class="logo">DeepSeek</div>
        <button class="nav-btn" id="scrollTopBtn">↑</button>
        <button class="nav-btn" id="scrollBottomBtn">↓</button>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="message assistant">
            <div class="avatar">🤖</div>
            <div class="bubble">测试版 - 点击下方按钮发送消息</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>
</div>

<script>
    // 极简测试 - 确保所有按钮都有反应
    console.log('脚本已启动');
    
    // 获取元素
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const sendBtn = document.getElementById('sendBtn');
    const msgInput = document.getElementById('messageInput');
    const messagesContainer = document.getElementById('messagesContainer');
    const newChatBtn = document.getElementById('newChatBtn');
    const scrollTopBtn = document.getElementById('scrollTopBtn');
    const scrollBottomBtn = document.getElementById('scrollBottomBtn');
    
    // 测试用：直接弹窗确认按钮可用
    if (menuToggle) {
        menuToggle.onclick = function() {
            alert('菜单按钮被点击了！');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        };
    } else {
        console.error('menuToggle 元素未找到');
    }
    
    if (overlay) {
        overlay.onclick = function() {
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
        };
    }
    
    if (sendBtn) {
        sendBtn.onclick = function() {
            const text = msgInput.value.trim();
            if (!text) {
                alert('请输入消息内容');
                return;
            }
            alert('发送消息: ' + text);
            // 添加一条测试消息
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user';
            msgDiv.innerHTML = '<div class="avatar">👤</div><div class="bubble">' + escapeHtml(text) + '</div>';
            messagesContainer.appendChild(msgDiv);
            msgInput.value = '';
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        };
    } else {
        console.error('sendBtn 元素未找到');
    }
    
    if (newChatBtn) {
        newChatBtn.onclick = function() {
            alert('新建对话');
            // 清空消息
            messagesContainer.innerHTML = '<div class="message assistant"><div class="avatar">🤖</div><div class="bubble">新对话已创建</div></div>';
        };
    }
    
    if (scrollTopBtn) {
        scrollTopBtn.onclick = function() {
            messagesContainer.scrollTo({ top: 0, behavior: 'smooth' });
        };
    }
    
    if (scrollBottomBtn) {
        scrollBottomBtn.onclick = function() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        };
    }
    
    // 回车发送
    if (msgInput) {
        msgInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (sendBtn) sendBtn.click();
            }
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 自动调整高度
    if (msgInput) {
        msgInput.style.height = 'auto';
        msgInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(100, this.scrollHeight) + 'px';
        });
    }
    
    console.log('初始化完成，所有按钮已绑定');
</script>
</body>
</html>
