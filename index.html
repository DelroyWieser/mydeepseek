<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek · 移动优化版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f0f0f;
            color: #e4e4e7;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .app {
            display: flex;
            height: 100%;
            position: relative;
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: #1a1a1a;
            border-right: 1px solid #2c2c2e;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            z-index: 30;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 12px rgba(0,0,0,0.4);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            z-index: 20;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #2c2c2e;
        }

        .new-chat-btn {
            width: 100%;
            background: #2c2c2e;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            background: #1f1f1f;
            border: 1px solid #2c2c2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item.active {
            background: #2d2d30;
            border-color: #4a4a4e;
        }

        .history-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .delete-history {
            background: none;
            border: none;
            color: #8e8e93;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: #0f0f0f;
        }

        .top-bar {
            padding: 12px 16px;
            background: #0f0f0f;
            border-bottom: 1px solid #2c2c2e;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .menu-btn {
            background: #1c1c1e;
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .logo-area {
            font-weight: 600;
            font-size: 18px;
            flex: 1;
            cursor: pointer;
            user-select: none;
            padding: 8px 0;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 80px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 100%;
            position: relative;
        }

        .message.user {
            justify-content: flex-end;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 32px;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #3a6ea5;
            order: 2;
        }

        .bubble {
            background: #1e1e20;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 15px;
            max-width: 85%;
            word-wrap: break-word;
            white-space: pre-wrap;
            position: relative;
        }

        .message.user .bubble {
            background: #2b4f7c;
        }

        .copy-btn {
            position: absolute;
            bottom: -32px;
            right: 8px;
            background: #2c2c2e;
            border: none;
            color: #aaa;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message:hover .copy-btn,
        .message:active .copy-btn {
            opacity: 1;
        }

        .copy-btn.copied {
            background: #3a6ea5;
            color: white;
            opacity: 1;
        }

        .file-card {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2c2c2e;
            padding: 6px 14px;
            border-radius: 24px;
            font-size: 13px;
            margin-bottom: 8px;
            width: fit-content;
        }

        .input-area {
            background: #0f0f0f;
            border-top: 1px solid #2c2c2e;
            padding: 12px 16px 20px;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: #1c1c1e;
            border-radius: 28px;
            padding: 6px 12px;
        }

        .file-label {
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            padding: 8px 4px;
            color: #8e8e93;
        }

        #fileInput {
            display: none;
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 10px 4px;
            max-height: 120px;
            resize: none;
            font-family: inherit;
            line-height: 1.4;
        }

        .message-input:focus {
            outline: none;
        }

        .send-btn {
            background: #2b4f7c;
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .send-btn:active {
            transform: scale(0.95);
            background: #1e3a5f;
        }

        .file-preview-card {
            background: #1c1c1e;
            border-radius: 20px;
            padding: 8px 12px;
            margin-top: 8px;
            display: none;
            align-items: center;
            justify-content: space-between;
        }

        .remove-file {
            background: none;
            border: none;
            color: #ff453a;
            font-size: 20px;
            padding: 4px 8px;
        }

        .input-hint {
            font-size: 11px;
            color: #5c5c5e;
            margin-top: 8px;
            margin-left: 12px;
        }

        @media (min-width: 768px) {
            .sidebar {
                position: relative;
                transform: translateX(0);
                width: 280px;
            }
            .overlay {
                display: none !important;
            }
            .menu-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>
    <div class="overlay" id="overlay"></div>

    <div class="main">
        <div class="top-bar">
            <button class="menu-btn" id="menuToggle">☰</button>
            <div class="logo-area" id="scrollToTopBtn">DeepSeek · 个人助理</div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="message assistant">
                <div class="avatar">🤖</div>
                <div class="bubble">你好！我是 DeepSeek。<br><br>📌 使用说明：<br>• Enter 换行，Shift+Enter 发送<br>• 点击标题滚动到底部，双击回到顶部<br>• 上传文件会以卡片展示，不会显示文件内容</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <label class="file-label">📎
                    <input type="file" id="fileInput" accept=".txt,.md,.json,.csv,.js,.py">
                </label>
                <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
            <div class="input-hint">↩ Enter 换行 · ⇧ Shift+Enter 发送</div>
            <div id="filePreviewArea" class="file-preview-card"></div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ==================== 配置 ====================
        let API_KEY = localStorage.getItem('deepseek_api_key');
        if (!API_KEY) {
            let key = prompt('🔐 请输入你的 DeepSeek API Key：\n(从 platform.deepseek.com 获取)');
            if (key && key.trim()) {
                API_KEY = key.trim();
                localStorage.setItem('deepseek_api_key', API_KEY);
            } else {
                API_KEY = '';
                alert('未输入 API Key，无法发送消息。刷新页面可重新输入。');
            }
        }

        const DEEPSEEK_URL = 'https://api.deepseek.com/v1/chat/completions';
        
        // 数据结构
        let conversations = [];
        let currentId = null;
        let isGenerating = false;
        let pendingFile = null;

        // DOM
        const msgContainer = document.getElementById('messagesContainer');
        const msgInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('fileInput');
        const filePreview = document.getElementById('filePreviewArea');
        const historyList = document.getElementById('historyList');
        const newChatBtn = document.getElementById('newChatBtn');
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const titleBtn = document.getElementById('scrollToTopBtn');

        // 辅助函数
        function save() {
            localStorage.setItem('deepseek_chats', JSON.stringify(conversations));
        }

        function load() {
            let raw = localStorage.getItem('deepseek_chats');
            if (raw) {
                try {
                    conversations = JSON.parse(raw);
                } catch(e) { conversations = []; }
            }
            if (!conversations.length) {
                conversations = [{ id: Date.now().toString(), title: '新对话', messages: [] }];
            }
            if (!currentId || !conversations.find(c => c.id === currentId)) {
                currentId = conversations[0].id;
            }
            renderHistory();
            renderChat();
        }

        function renderHistory() {
            historyList.innerHTML = '';
            conversations.forEach(conv => {
                let div = document.createElement('div');
                div.className = 'history-item';
                if (conv.id === currentId) div.classList.add('active');
                let title = conv.title || (conv.messages[0]?.content?.slice(0, 20) || '新对话');
                div.innerHTML = `<span class="history-title">${escapeHtml(title)}</span><button class="delete-history" data-id="${conv.id}">🗑</button>`;
                div.onclick = (e) => {
                    if (e.target.classList.contains('delete-history')) return;
                    if (!isGenerating) {
                        currentId = conv.id;
                        renderHistory();
                        renderChat();
                        closeSidebar();
                    } else {
                        alert('请等待回复完成');
                    }
                };
                div.querySelector('.delete-history').onclick = (e) => {
                    e.stopPropagation();
                    deleteChat(conv.id);
                };
                historyList.appendChild(div);
            });
        }

        function deleteChat(id) {
            if (conversations.length === 1) {
                alert('至少保留一个对话');
                return;
            }
            conversations = conversations.filter(c => c.id !== id);
            if (currentId === id) currentId = conversations[0].id;
            save();
            renderHistory();
            renderChat();
        }

        function newChat() {
            if (isGenerating) {
                alert('请等待回复完成');
                return;
            }
            let newId = Date.now().toString();
            conversations.unshift({ id: newId, title: '新对话', messages: [] });
            currentId = newId;
            save();
            renderHistory();
            renderChat();
            closeSidebar();
        }

        function formatText(text) {
            if (!text) return '';
            return escapeHtml(text).replace(/\n/g, '<br>');
        }

        function renderChat() {
            let conv = conversations.find(c => c.id === currentId);
            if (!conv) return;
            msgContainer.innerHTML = '';
            if (conv.messages.length === 0) {
                msgContainer.innerHTML = '<div class="message assistant"><div class="avatar">🤖</div><div class="bubble">有什么可以帮你的？上传文件或直接提问~</div></div>';
            } else {
                conv.messages.forEach((msg, idx) => {
                    let div = document.createElement('div');
                    div.className = `message ${msg.role}`;
                    let avatar = msg.role === 'user' ? '👤' : '🤖';
                    let contentHtml = '';
                    
                    if (msg.role === 'user' && msg.fileMeta) {
                        contentHtml += `<div class="file-card">📄 ${escapeHtml(msg.fileMeta.name)}</div>`;
                    }
                    let displayText = msg.textOnly || msg.content;
                    if (displayText && displayText.length > 0) {
                        contentHtml += formatText(displayText);
                    }
                    
                    let copyText = msg.textOnly || msg.content;
                    if (msg.fileMeta && (!copyText || copyText.length === 0)) {
                        copyText = `[文件] ${msg.fileMeta.name}`;
                    }
                    
                    div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${contentHtml}<button class="copy-btn" data-text="${escapeHtml(copyText).replace(/"/g, '&quot;')}">📋 复制</button></div>`;
                    msgContainer.appendChild(div);
                });
            }
            
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    let text = btn.getAttribute('data-text') || '';
                    if (text) {
                        navigator.clipboard.writeText(text).then(() => {
                            btn.innerText = '✅';
                            setTimeout(() => { btn.innerText = '📋 复制'; }, 1500);
                        });
                    }
                };
            });
            scrollToBottom();
        }

        function addMessage(role, content, fileMeta = null, saveNow = true) {
            let conv = conversations.find(c => c.id === currentId);
            if (conv) {
                let msg = { role, content, timestamp: Date.now() };
                if (fileMeta) {
                    msg.fileMeta = fileMeta;
                    let cleanText = content.replace(/【用户上传的文件：.*?】[\s\S]*?【文件结束】\n?/g, '').trim();
                    msg.textOnly = cleanText;
                }
                conv.messages.push(msg);
                if (saveNow) save();
                if (role === 'user' && conv.messages.filter(m => m.role === 'user').length === 1) {
                    conv.title = content.slice(0, 25);
                    renderHistory();
                }
                renderChat();
            }
        }

        // 发送消息
        async function sendMessage() {
            console.log('sendMessage 被调用'); // 调试日志
            
            if (isGenerating) {
                alert('请等待回复完成');
                return;
            }
            
            if (!API_KEY) {
                alert('未设置 API Key，请刷新页面重新输入');
                return;
            }
            
            let userText = msgInput.value;
            if ((!userText || userText.trim() === '') && !pendingFile) {
                return;
            }
            
            let finalContent = userText || '';
            let attachedFile = null;
            let fileForAI = '';
            
            if (pendingFile) {
                attachedFile = { name: pendingFile.name };
                fileForAI = `\n\n【用户上传的文件：${pendingFile.name}】\n文件内容：\n${pendingFile.content}\n【文件结束】\n`;
                if (finalContent) {
                    finalContent = finalContent + fileForAI;
                } else {
                    finalContent = `请分析上传的文件《${pendingFile.name}》` + fileForAI;
                }
                pendingFile = null;
                filePreview.style.display = 'none';
                filePreview.innerHTML = '';
                fileInput.value = '';
            }
            
            if (!finalContent) return;
            
            addMessage('user', finalContent, attachedFile);
            msgInput.value = '';
            msgInput.style.height = 'auto';
            
            let conv = conversations.find(c => c.id === currentId);
            let aiIndex = conv.messages.length;
            conv.messages.push({ role: 'assistant', content: '' });
            save();
            renderChat();
            
            isGenerating = true;
            sendBtn.disabled = true;
            
            let apiMessages = conv.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
            apiMessages.unshift({ role: 'system', content: '你是DeepSeek助手，回复时使用换行分段，使内容清晰。' });
            
            try {
                let response = await fetch(DEEPSEEK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: apiMessages,
                        stream: true,
                        temperature: 0.7
                    })
                });
                
                if (!response.ok) {
                    let err = await response.text();
                    throw new Error(`HTTP ${response.status}`);
                }
                
                let reader = response.body.getReader();
                let decoder = new TextDecoder();
                let full = '';
                let buffer = '';
                
                while (true) {
                    let { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    let lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (let line of lines) {
                        if (line.startsWith('data: ')) {
                            let data = line.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                let json = JSON.parse(data);
                                let delta = json.choices[0]?.delta?.content || '';
                                if (delta) {
                                    full += delta;
                                    let curr = conversations.find(c => c.id === currentId);
                                    if (curr && curr.messages[aiIndex]) {
                                        curr.messages[aiIndex].content = full;
                                        let bubbles = document.querySelectorAll('.message.assistant .bubble');
                                        if (bubbles[aiIndex]) {
                                            let formatted = formatText(full);
                                            bubbles[aiIndex].innerHTML = formatted + `<button class="copy-btn" data-text="${escapeHtml(full).replace(/"/g, '&quot;')}">📋 复制</button>`;
                                            bubbles[aiIndex].querySelector('.copy-btn').onclick = (e) => {
                                                e.stopPropagation();
                                                navigator.clipboard.writeText(full).then(() => {
                                                    e.target.innerText = '✅';
                                                    setTimeout(() => { e.target.innerText = '📋 复制'; }, 1500);
                                                });
                                            };
                                        }
                                    }
                                    scrollToBottom();
                                }
                            } catch(e) {}
                        }
                    }
                }
                save();
                renderChat();
            } catch(err) {
                console.error(err);
                let curr = conversations.find(c => c.id === currentId);
                if (curr && curr.messages[aiIndex]) {
                    curr.messages[aiIndex].content = `❌ 错误: ${err.message}`;
                    save();
                    renderChat();
                }
            }
            isGenerating = false;
            sendBtn.disabled = false;
        }
        
        function handleFile(file) {
            let reader = new FileReader();
            reader.onload = (e) => {
                let content = e.target.result;
                if (content.length > 6000) content = content.slice(0, 6000) + '\n...(截断)';
                pendingFile = { name: file.name, content: content };
                filePreview.style.display = 'flex';
                filePreview.innerHTML = `<span>📎 ${escapeHtml(file.name)}</span><button class="remove-file">✖</button>`;
                filePreview.querySelector('.remove-file').onclick = () => {
                    pendingFile = null;
                    filePreview.style.display = 'none';
                    fileInput.value = '';
                };
            };
            reader.readAsText(file, 'UTF-8');
        }
        
        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        function autoResize() {
            this.style.height = 'auto';
            this.style.height = Math.min(100, this.scrollHeight) + 'px';
        }
        
        function scrollToBottom() {
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }
        
        function scrollToTop() {
            msgContainer.scrollTop = 0;
        }
        
        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
        }
        
        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('show');
        }
        
        // 双击标题回顶，单击回底
        let titleTimer = null;
        titleBtn.onclick = () => {
            if (titleTimer) {
                clearTimeout(titleTimer);
                titleTimer = null;
                scrollToTop();
            } else {
                titleTimer = setTimeout(() => {
                    scrollToBottom();
                    titleTimer = null;
                }, 200);
            }
        };
        
        // 发送按钮 - 确保移动端响应
        sendBtn.onclick = function(e) {
            e.preventDefault();
            e.stopPropagation();
            sendMessage();
        };
        
        // 触摸事件备用
        sendBtn.ontouchstart = function(e) {
            e.preventDefault();
            e.stopPropagation();
            sendMessage();
        };
        
        msgInput.onkeydown = (e) => {
            if (e.key === 'Enter' && e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };
        
        msgInput.oninput = autoResize;
        fileInput.onchange = (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); };
        newChatBtn.onclick = newChat;
        menuToggle.onclick = () => { if (sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); };
        overlay.onclick = closeSidebar;
        
        load();
        autoResize.call(msgInput);
        
        console.log('页面加载完成，发送按钮已绑定');
    })();
</script>
</body>
</html>
