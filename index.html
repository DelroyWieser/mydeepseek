<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek 完全版 · 编辑重发 + 双向复制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f0f0f;
            color: #e4e4e7;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: #1a1a1a;
            border-right: 1px solid #2c2c2e;
            transform: translateX(-100%);
            transition: transform 0.2s ease;
            z-index: 30;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 12px rgba(0,0,0,0.5);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            z-index: 20;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #2c2c2e;
        }

        .new-chat-btn {
            width: 100%;
            background: #2c2c2e;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            background: #1f1f1f;
            border: 1px solid #2c2c2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item.active {
            background: #2d2d30;
            border-color: #4a6e8c;
        }

        .history-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            font-size: 14px;
        }

        .delete-history {
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
        }

        /* 主聊天区 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: #0f0f0f;
        }

        .top-bar {
            padding: 12px 16px;
            background: #0f0f0f;
            border-bottom: 1px solid #2c2c2e;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .menu-btn {
            background: #1c1c1e;
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
        }

        .logo-area {
            font-weight: 600;
            font-size: 18px;
            flex: 1;
        }

        .nav-btn {
            background: #2c2c2e;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 消息容器 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 90px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 100%;
            position: relative;
        }

        .message.user {
            justify-content: flex-end;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 32px;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #2b4f7c;
            order: 2;
        }

        .bubble {
            background: #1e1e20;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.45;
            font-size: 15px;
            max-width: 85%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .bubble {
            background: #2b4f7c;
        }

        /* 消息操作栏：复制 + 编辑重发 */
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            justify-content: flex-end;
        }
        .message.user .message-actions {
            justify-content: flex-end;
        }
        .action-btn {
            background: #3a3a3c;
            border: none;
            color: #ccc;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.1s;
        }
        .action-btn:active {
            background: #4a4a4e;
        }
        .edit-btn {
            background: #2c4f6e;
        }
        
        /* 编辑模式样式 */
        .edit-textarea {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid #4a6e8c;
            color: white;
            padding: 8px;
            border-radius: 16px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 8px;
        }
        .edit-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .edit-save {
            background: #2b4f7c;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 16px;
            cursor: pointer;
        }
        .edit-cancel {
            background: #3a3a3c;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 16px;
            cursor: pointer;
        }

        /* 输入区 */
        .input-area {
            background: #0f0f0f;
            border-top: 1px solid #2c2c2e;
            padding: 10px 12px 16px 12px;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #1c1c1e;
            border-radius: 30px;
            padding: 4px 10px;
        }

        .file-label {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #8e8e93;
            padding: 6px;
        }

        #fileInput {
            display: none;
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 10px 4px;
            max-height: 100px;
            font-family: inherit;
            resize: none;
        }

        .message-input:focus {
            outline: none;
        }

        .send-btn {
            background: #2b4f7c;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:disabled {
            opacity: 0.5;
        }

        .file-preview-badge {
            background: #1c1c1e;
            border-radius: 20px;
            padding: 4px 12px;
            margin-top: 6px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .remove-file {
            background: none;
            border: none;
            color: #ff453a;
            font-size: 16px;
            cursor: pointer;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #2b4f7c;
            border-radius: 8px;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        @media (min-width: 768px) {
            .sidebar {
                transform: translateX(0);
                position: relative;
            }
            .overlay {
                display: none !important;
            }
            .menu-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
    </div>
    <div class="history-list" id="historyList"></div>
    <div style="padding: 14px; font-size: 10px; color: #5c5c5e; text-align: center; border-top:1px solid #2c2c2e;">
        API Key 本地存储
    </div>
</div>
<div class="overlay" id="overlay"></div>

<div class="main">
    <div class="top-bar">
        <button class="menu-btn" id="menuToggle">☰</button>
        <div class="logo-area">DeepSeek 完全版</div>
        <button class="nav-btn" id="scrollTopBtn" title="回到顶部">↑</button>
        <button class="nav-btn" id="scrollBottomBtn" title="跳到底部">↓</button>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="message assistant">
            <div class="avatar">🤖</div>
            <div class="bubble">✨ 功能全面升级<br>• 点击消息旁的📋复制任何内容<br>• 点击✏️编辑你的问题并重新生成回复<br>• 生成时可自由滑动页面<br>• 支持文件上传</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <label class="file-label" title="上传文件">📎
                <input type="file" id="fileInput" accept=".txt,.md,.json,.csv,.js,.py,.html,.css,.xml">
            </label>
            <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <div id="filePreviewArea" style="min-height: 28px;"></div>
    </div>
</div>

<script>
    // ========== 配置 ==========
    let API_KEY = localStorage.getItem('deepseek_api_key');
    if (!API_KEY) {
        let inputKey = prompt('🔑 输入 DeepSeek API Key (platform.deepseek.com)\n密钥仅存本地，安全可靠');
        if (inputKey?.trim()) {
            API_KEY = inputKey.trim();
            localStorage.setItem('deepseek_api_key', API_KEY);
        } else {
            API_KEY = '';
            alert('未输入 API Key，对话无法发送');
        }
    }

    const DEEPSEEK_URL = 'https://api.deepseek.com/v1/chat/completions';
    const MODEL = 'deepseek-chat';
    
    // 数据结构
    let conversations = [];
    let currentId = null;
    let isGenerating = false;
    let pendingFile = null;
    
    // 滚动控制
    let autoScrollEnabled = true;
    let scrollTimeout = null;
    
    // DOM 元素
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuToggle = document.getElementById('menuToggle');
    const newChatBtn = document.getElementById('newChatBtn');
    const historyList = document.getElementById('historyList');
    const msgContainer = document.getElementById('messagesContainer');
    const msgInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const filePreviewArea = document.getElementById('filePreviewArea');
    const scrollTopBtn = document.getElementById('scrollTopBtn');
    const scrollBottomBtn = document.getElementById('scrollBottomBtn');
    
    // ========== 辅助函数 ==========
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatLines(text) {
        if (!text) return '';
        return escapeHtml(text).replace(/\n/g, '<br>');
    }
    
    function saveData() {
        localStorage.setItem('deepseek_conversations', JSON.stringify(conversations));
    }
    
    function loadData() {
        let raw = localStorage.getItem('deepseek_conversations');
        if (raw) {
            try {
                conversations = JSON.parse(raw);
                if (!Array.isArray(conversations)) conversations = [];
                conversations.forEach(c => { if (!c.messages) c.messages = []; });
            } catch(e) { conversations = []; }
        }
        if (!conversations.length) {
            let newId = Date.now().toString();
            conversations = [{ id: newId, title: '新对话', messages: [] }];
        }
        if (!currentId || !conversations.find(c => c.id === currentId)) {
            currentId = conversations[0].id;
        }
    }
    
    function renderSidebar() {
        if (!historyList) return;
        historyList.innerHTML = '';
        for (let conv of conversations) {
            let div = document.createElement('div');
            div.className = 'history-item';
            if (conv.id === currentId) div.classList.add('active');
            let title = conv.title;
            if (!title || title === '新对话') {
                let firstMsg = conv.messages.find(m => m.role === 'user');
                title = firstMsg ? firstMsg.content.slice(0, 24) : '新对话';
                conv.title = title;
            }
            div.innerHTML = `<span class="history-title">${escapeHtml(title)}</span><button class="delete-history" data-id="${conv.id}">🗑</button>`;
            div.querySelector('.delete-history').onclick = (e) => {
                e.stopPropagation();
                deleteConv(conv.id);
            };
            div.onclick = () => switchConv(conv.id);
            historyList.appendChild(div);
        }
    }
    
    function deleteConv(id) {
        if (conversations.length === 1) { alert('至少保留一个对话'); return; }
        conversations = conversations.filter(c => c.id !== id);
        if (currentId === id) currentId = conversations[0].id;
        saveData();
        renderSidebar();
        renderMessages();
    }
    
    function switchConv(id) {
        if (isGenerating) { alert('请等待回复完成'); return; }
        currentId = id;
        renderSidebar();
        renderMessages();
        if (window.innerWidth < 768) closeSidebar();
    }
    
    // 通用复制函数
    async function copyToClip(text, label = '内容') {
        try {
            await navigator.clipboard.writeText(text);
            // 轻提示不阻塞
            let toast = document.createElement('div');
            toast.innerText = `✅ ${label}已复制`;
            toast.style.position = 'fixed';
            toast.style.bottom = '80px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = '#2c2c2e';
            toast.style.color = 'white';
            toast.style.padding = '6px 14px';
            toast.style.borderRadius = '30px';
            toast.style.fontSize = '13px';
            toast.style.zIndex = '1000';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        } catch(e) {
            let ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            alert('✅ 已复制');
        }
    }
    
    // 编辑并重新生成
    function editAndRegenerate(msgIndex, oldContent) {
        if (isGenerating) { alert('请等待当前回复完成'); return; }
        // 弹出编辑框（简洁方式：使用 prompt 或原地编辑，使用 prompt 保证速度且不复杂）
        let newContent = prompt('编辑你的消息，重新生成回复：', oldContent);
        if (!newContent || newContent.trim() === '') return;
        newContent = newContent.trim();
        
        let conv = conversations.find(c => c.id === currentId);
        if (!conv) return;
        // 删除该用户消息之后的所有消息（包括这条用户消息本身以及之后的所有 assistant 回复）
        // 保留该消息之前的对话
        let beforeMessages = conv.messages.slice(0, msgIndex);
        // 新消息内容
        beforeMessages.push({ role: 'user', content: newContent, timestamp: Date.now() });
        conv.messages = beforeMessages;
        saveData();
        renderMessages();
        // 自动触发发送新消息（重新生成回复）
        // 需要模拟发送最新一条用户消息
        sendEditedMessage(newContent);
    }
    
    // 发送编辑后的消息（直接调用流式API）
    async function sendEditedMessage(userMessageText) {
        if (isGenerating) return;
        // 获取当前会话
        let conv = conversations.find(c => c.id === currentId);
        if (!conv) return;
        
        // 添加占位 assistant
        conv.messages.push({ role: 'assistant', content: '' });
        saveData();
        renderMessages(); // 重新渲染，显示占位
        
        // 获取最后一条 assistant 的DOM元素用于流式更新
        let assistantDivs = msgContainer.querySelectorAll('.message.assistant');
        let targetDiv = assistantDivs[assistantDivs.length - 1];
        let bubbleDiv = targetDiv?.querySelector('.bubble');
        if (bubbleDiv) {
            bubbleDiv.innerHTML = '<span class="status-indicator"></span> 生成中...';
        }
        
        isGenerating = true;
        sendBtn.disabled = true;
        
        // 构建 API 消息（包含最新用户消息）
        let apiMessages = [];
        apiMessages.push({ role: 'system', content: '你是DeepSeek助手，回答时请使用换行分段让阅读更舒适。直接给出清晰、分段的结果。' });
        let history = conv.messages.slice(0, -1); // 去掉刚添加的空assistant
        let recent = history.slice(-12);
        for (let m of recent) {
            apiMessages.push({ role: m.role, content: m.content });
        }
        
        try {
            let response = await fetch(DEEPSEEK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: MODEL,
                    messages: apiMessages,
                    stream: true,
                    temperature: 0.6,
                    max_tokens: 2048
                })
            });
            if (!response.ok) throw new Error(`API ${response.status}`);
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullAnswer = '';
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (let line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed === 'data: [DONE]') continue;
                    if (trimmed.startsWith('data: ')) {
                        try {
                            const json = JSON.parse(trimmed.slice(6));
                            const delta = json.choices[0]?.delta?.content || '';
                            if (delta) {
                                fullAnswer += delta;
                                if (bubbleDiv) {
                                    bubbleDiv.innerHTML = formatLines(fullAnswer);
                                }
                                if (autoScrollEnabled) scrollToBottom();
                            }
                        } catch(e) {}
                    }
                }
            }
            // 最终更新
            let finalConv = conversations.find(c => c.id === currentId);
            if (finalConv && finalConv.messages.length > 0 && finalConv.messages[finalConv.messages.length-1].role === 'assistant') {
                finalConv.messages[finalConv.messages.length-1].content = fullAnswer || '(空回复)';
                saveData();
            }
            if (bubbleDiv) {
                bubbleDiv.innerHTML = formatLines(fullAnswer || '(空回复)');
                // 添加复制按钮
                let copyBtn = document.createElement('button');
                copyBtn.innerText = '📋 复制';
                copyBtn.className = 'action-btn';
                copyBtn.style.marginTop = '6px';
                copyBtn.onclick = (e) => { e.stopPropagation(); copyToClip(fullAnswer, '回复'); };
                bubbleDiv.appendChild(copyBtn);
            }
        } catch(err) {
            if (bubbleDiv) bubbleDiv.innerHTML = formatLines(`❌ 请求失败: ${err.message}`);
            let convErr = conversations.find(c => c.id === currentId);
            if (convErr && convErr.messages.length > 0 && convErr.messages[convErr.messages.length-1].role === 'assistant') {
                convErr.messages[convErr.messages.length-1].content = `❌ 错误: ${err.message}`;
                saveData();
            }
        } finally {
            isGenerating = false;
            sendBtn.disabled = false;
            if (autoScrollEnabled) scrollToBottom();
        }
    }
    
    // 渲染对话（每条消息带复制按钮，用户消息带编辑按钮）
    function renderMessages() {
        let conv = conversations.find(c => c.id === currentId);
        if (!conv) return;
        msgContainer.innerHTML = '';
        if (conv.messages.length === 0) {
            msgContainer.innerHTML = `<div class="message assistant"><div class="avatar">🤖</div><div class="bubble">📄 编辑任意问题即可重新生成回复，支持双向复制。</div></div>`;
        } else {
            conv.messages.forEach((msg, idx) => {
                let div = document.createElement('div');
                div.className = `message ${msg.role}`;
                let avatar = msg.role === 'user' ? '👤' : '🤖';
                let formatted = formatLines(msg.content);
                div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${formatted}</div>`;
                let bubble = div.querySelector('.bubble');
                // 添加操作按钮容器
                let actionsDiv = document.createElement('div');
                actionsDiv.className = 'message-actions';
                // 复制按钮（所有消息都有）
                let copyBtn = document.createElement('button');
                copyBtn.innerText = '📋 复制';
                copyBtn.className = 'action-btn';
                copyBtn.onclick = (e) => {
                    e.stopPropagation();
                    copyToClip(msg.content, msg.role === 'user' ? '问题' : '回复');
                };
                actionsDiv.appendChild(copyBtn);
                // 如果是用户消息，增加编辑重发按钮
                if (msg.role === 'user') {
                    let editBtn = document.createElement('button');
                    editBtn.innerText = '✏️ 编辑重发';
                    editBtn.className = 'action-btn edit-btn';
                    editBtn.onclick = (e) => {
                        e.stopPropagation();
                        if (isGenerating) { alert('请等待回复完成'); return; }
                        editAndRegenerate(idx, msg.content);
                    };
                    actionsDiv.appendChild(editBtn);
                }
                bubble.appendChild(actionsDiv);
                msgContainer.appendChild(div);
            });
        }
        scrollToBottom();
    }
    
    // 流式发送新消息（原有逻辑增强）
    let currentStreamingDiv = null;
    let currentStreamingBubble = null;
    
    function initStreamingMessage() {
        let conv = conversations.find(c => c.id === currentId);
        if (!conv) return null;
        conv.messages.push({ role: 'assistant', content: '' });
        saveData();

        if (currentStreamingBubble) {

        if (!currentStreamingDiv || !currentStreamingBubble) return;
        let finalContent = fullText || '(空回复)';
        let conv = conversations.find(c => c.id === currentId);
        if (conv && conv.messages.length > 0 && conv.messages[conv.messages.length-1].role === 'assistant') {
            conv.messages[conv.messages.length-1].content = finalContent;
            saveData();
        }
        currentStreamingBubble.innerHTML = formatLines(finalContent);
        let actionsDiv = document.createElement('div');
        actionsDiv.className = 'message-actions';
        let copyBtn = document.createElement('button');
        copyBtn.innerText = '📋 复制';
        copyBtn.className = 'action-btn';
        copyBtn.onclick = (e) => { e.stopPropagation(); copyToClip(finalContent, '回复'); };
        actionsDiv.appendChild(copyBtn);
        currentStreamingBubble.appendChild(actionsDiv);
        currentStreamingDiv = null;
        currentStreamingBubble = null;
        if (autoScrollEnabled) scrollToBottom();
    }
