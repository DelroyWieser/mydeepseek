<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek 流畅版 · 自由滚动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f0f0f;
            color: #e4e4e7;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: #1a1a1a;
            border-right: 1px solid #2c2c2e;
            transform: translateX(-100%);
            transition: transform 0.2s ease;
            z-index: 30;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 12px rgba(0,0,0,0.5);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            z-index: 20;
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #2c2c2e;
        }

        .new-chat-btn {
            width: 100%;
            background: #2c2c2e;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            background: #1f1f1f;
            border: 1px solid #2c2c2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item.active {
            background: #2d2d30;
            border-color: #4a6e8c;
        }

        .history-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            font-size: 14px;
        }

        .delete-history {
            background: none;
            border: none;
            color: #8e8e93;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
        }

        /* 主聊天区 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: #0f0f0f;
        }

        .top-bar {
            padding: 12px 16px;
            background: #0f0f0f;
            border-bottom: 1px solid #2c2c2e;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .menu-btn {
            background: #1c1c1e;
            border: none;
            color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
        }

        .logo-area {
            font-weight: 600;
            font-size: 18px;
            flex: 1;
        }

        .nav-btn {
            background: #2c2c2e;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 消息容器 - 关键：允许用户在生成时自由滚动 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 90px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 100%;
        }

        .message.user {
            justify-content: flex-end;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 32px;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: #2b4f7c;
            order: 2;
        }

        .bubble {
            background: #1e1e20;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.45;
            font-size: 15px;
            max-width: 85%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .bubble {
            background: #2b4f7c;
        }

        /* 复制按钮 */
        .copy-btn {
            background: #3a3a3c;
            border: none;
            color: #ccc;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 6px;
            display: inline-block;
        }

        /* 输入区 */
        .input-area {
            background: #0f0f0f;
            border-top: 1px solid #2c2c2e;
            padding: 10px 12px 16px 12px;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #1c1c1e;
            border-radius: 30px;
            padding: 4px 10px;
        }

        .file-label {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #8e8e93;
            padding: 6px;
        }

        #fileInput {
            display: none;
        }

        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 10px 4px;
            max-height: 100px;
            font-family: inherit;
            resize: none;
        }

        .message-input:focus {
            outline: none;
        }

        .send-btn {
            background: #2b4f7c;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:disabled {
            opacity: 0.5;
        }

        .file-preview-badge {
            background: #1c1c1e;
            border-radius: 20px;
            padding: 4px 12px;
            margin-top: 6px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .remove-file {
            background: none;
            border: none;
            color: #ff453a;
            font-size: 16px;
            cursor: pointer;
        }

        /* 轻量状态指示器，不影响滚动 */
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #2b4f7c;
            border-radius: 8px;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        @media (min-width: 768px) {
            .sidebar {
                transform: translateX(0);
                position: relative;
            }
            .overlay {
                display: none !important;
            }
            .menu-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
    </div>
    <div class="history-list" id="historyList"></div>
    <div style="padding: 14px; font-size: 10px; color: #5c5c5e; text-align: center; border-top:1px solid #2c2c2e;">
        API Key 本地存储
    </div>
</div>
<div class="overlay" id="overlay"></div>

<div class="main">
    <div class="top-bar">
        <button class="menu-btn" id="menuToggle">☰</button>
        <div class="logo-area">DeepSeek 流畅版</div>
        <button class="nav-btn" id="scrollTopBtn" title="回到顶部">↑</button>
        <button class="nav-btn" id="scrollBottomBtn" title="跳到底部">↓</button>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="message assistant">
            <div class="avatar">🤖</div>
            <div class="bubble">✨ 流畅模式已启用<br>• 生成文字时仍可自由滑动页面<br>• 支持文件上传，回复自动分段<br>• 点击↓一键到底，↑回到顶部</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <label class="file-label" title="上传文件">📎
                <input type="file" id="fileInput" accept=".txt,.md,.json,.csv,.js,.py,.html,.css,.xml">
            </label>
            <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
        <div id="filePreviewArea" style="min-height: 28px;"></div>
    </div>
</div>

<script>
    // ========== 配置 ==========
    let API_KEY = localStorage.getItem('deepseek_api_key');
    if (!API_KEY) {
        let inputKey = prompt('🔑 输入 DeepSeek API Key (platform.deepseek.com)\n密钥仅存本地，安全可靠');
        if (inputKey?.trim()) {
            API_KEY = inputKey.trim();
            localStorage.setItem('deepseek_api_key', API_KEY);
        } else {
            API_KEY = '';
            alert('未输入 API Key，对话无法发送');
        }
    }

    const DEEPSEEK_URL = 'https://api.deepseek.com/v1/chat/completions';
    const MODEL = 'deepseek-chat';
    
    // 数据结构
    let conversations = [];
    let currentId = null;
    let isGenerating = false;
    let pendingFile = null;      // { name, content }
    
    // 滚动控制标志：用于在流式更新时避免强制滚动干扰用户操作
    let autoScrollEnabled = true;      // 用户滚动时会暂时禁用自动滚动
    let scrollTimeout = null;
    
    // DOM 元素
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuToggle = document.getElementById('menuToggle');
    const newChatBtn = document.getElementById('newChatBtn');
    const historyList = document.getElementById('historyList');
    const msgContainer = document.getElementById('messagesContainer');
    const msgInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileInput = document.getElementById('fileInput');
    const filePreviewArea = document.getElementById('filePreviewArea');
    const scrollTopBtn = document.getElementById('scrollTopBtn');
    const scrollBottomBtn = document.getElementById('scrollBottomBtn');
    
    // ========== 辅助函数 ==========
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // 格式化换行
    function formatLines(text) {
        if (!text) return '';
        return escapeHtml(text).replace(/\n/g, '<br>');
    }
    
    // 保存数据
    function saveData() {
        localStorage.setItem('deepseek_conversations', JSON.stringify(conversations));
    }
    
    // 加载历史
    function loadData() {
        let raw = localStorage.getItem('deepseek_conversations');
        if (raw) {
            try {
                conversations = JSON.parse(raw);
                if (!Array.isArray(conversations)) conversations = [];
                conversations.forEach(c => { if (!c.messages) c.messages = []; });
            } catch(e) { conversations = []; }
        }
        if (!conversations.length) {
            let newId = Date.now().toString();
            conversations = [{ id: newId, title: '新对话', messages: [] }];
        }
        if (!currentId || !conversations.find(c => c.id === currentId)) {
            currentId = conversations[0].id;
        }
    }
    
    // 渲染侧边栏
    function renderSidebar() {
        if (!historyList) return;
        historyList.innerHTML = '';
        for (let conv of conversations) {
            let div = document.createElement('div');
            div.className = 'history-item';
            if (conv.id === currentId) div.classList.add('active');
            let title = conv.title;
            if (!title || title === '新对话') {
                let firstMsg = conv.messages.find(m => m.role === 'user');
                title = firstMsg ? firstMsg.content.slice(0, 24) : '新对话';
                conv.title = title;
            }
            div.innerHTML = `<span class="history-title">${escapeHtml(title)}</span><button class="delete-history" data-id="${conv.id}">🗑</button>`;
            div.querySelector('.delete-history').onclick = (e) => {
                e.stopPropagation();
                deleteConv(conv.id);
            };
            div.onclick = () => switchConv(conv.id);
            historyList.appendChild(div);
        }
    }
    
    function deleteConv(id) {
        if (conversations.length === 1) { alert('至少保留一个对话'); return; }
        conversations = conversations.filter(c => c.id !== id);
        if (currentId === id) currentId = conversations[0].id;
        saveData();
        renderSidebar();
        renderMessages();
    }
    
    function switchConv(id) {
        if (isGenerating) { alert('请等待回复完成'); return; }
        currentId = id;
        renderSidebar();
        renderMessages();
        if (window.innerWidth < 768) closeSidebar();
    }
    
    // 渲染当前对话
    function renderMessages() {
        let conv = conversations.find(c => c.id === currentId);
        if (!conv) return;
        msgContainer.innerHTML = '';
        if (conv.messages.length === 0) {
            msgContainer.innerHTML = `<div class="message assistant"><div class="avatar">🤖</div><div class="bubble">📄 支持上传文件，直接提问即可，回复会自动分段。生成时可自由滑动页面。</div></div>`;
        } else {
            conv.messages.forEach((msg, idx) => {
                let div = document.createElement('div');
                div.className = `message ${msg.role}`;
                let avatar = msg.role === 'user' ? '👤' : '🤖';
                let formatted = formatLines(msg.content);
                div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${formatted}</div>`;
                if (msg.role === 'assistant' && msg.content) {
                    let bubble = div.querySelector('.bubble');
                    let copyBtn = document.createElement('button');
                    copyBtn.innerText = '📋 复制';
                    copyBtn.className = 'copy-btn';
                    copyBtn.onclick = (e) => {
                        e.stopPropagation();
                        copyToClip(msg.content);
                    };
                    bubble.appendChild(copyBtn);
                }
                msgContainer.appendChild(div);
            });
        }
        scrollToBottom();
    }
    
    async function copyToClip(text) {
        try {
            await navigator.clipboard.writeText(text);
            alert('✅ 已复制');
        } catch(e) {
            let ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            alert('✅ 已复制');
        }
    }
    
    // 添加消息
    function appendMessage(role, content, save = true) {
        let conv = conversations.find(c => c.id === currentId);
        if (!conv) return;
        conv.messages.push({ role, content });
        if (save) saveData();
        
        let msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        let avatar = role === 'user' ? '👤' : '🤖';
        let formatted = formatLines(content);
        msgDiv.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${formatted}</div>`;
        if (role === 'assistant' && content) {
            let bubble = msgDiv.querySelector('.bubble');
            let copyBtn = document.createElement('button');
            copyBtn.innerText = '📋 复制';
            copyBtn.className = 'copy-btn';
            copyBtn.onclick = (e) => { e.stopPropagation(); copyToClip(content); };
            bubble.appendChild(copyBtn);
        }
        msgContainer.appendChild(msgDiv);
        
        // 智能滚动：仅当用户没有主动滚动时才自动滚动
        if (autoScrollEnabled) {
            scrollToBottom();
        }
        
        if (role === 'user' && conv.messages.filter(m => m.role === 'user').length === 1) {
            let newTitle = content.slice(0, 26);
            conv.title = newTitle || '新对话';
            saveData();
            renderSidebar();
        }
    }
    
    // 流式更新最后一条消息的内容（不强制滚动，尊重用户操作）
    let currentStreamingDiv = null;
    let currentStreamingBubble = null;
    
    function initStreamingMessage() {
        // 创建新的 assistant 消息占位
        let conv = conversations.find(c => c.id === currentId);
        if (!conv) return null;
        conv.messages.push({ role: 'assistant', content: '' });
        saveData();
        
        let msgDiv = document.createElement('div');
        msgDiv.className = 'message assistant';
        msgDiv.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><span class="status-indicator"></span> 生成中...</div>`;
        msgContainer.appendChild(msgDiv);
        currentStreamingDiv = msgDiv;
        currentStreamingBubble = msgDiv.querySelector('.bubble');
        
        // 如果自动滚动开启，则滚动到底部
        if (autoScrollEnabled) {
            scrollToBottom();
        }
        return msgDiv;
    }
    
    function updateStreamingContent(fullText) {
        if (!currentStreamingBubble) return;
        // 更新气泡内容，保留换行格式，但保留占位指示器样式
        let formatted = formatLines(fullText);
        currentStreamingBubble.innerHTML = formatted;
        // 添加一个小的复制按钮占位（结束后会重新添加完整按钮）
        // 不在这里加按钮，避免重复，最终完成时统一加
        // 重要: 不强制滚动，让用户自由决定
    }
    
    function finalizeStreamingMessage(fullText) {
        if (!currentStreamingDiv || !currentStreamingBubble) return;
        let finalContent = fullText || '(空回复)';
        let conv = conversations.find(c => c.id === currentId);
        if (conv && conv.messages.length > 0 && conv.messages[conv.messages.length-1].role === 'assistant') {
            conv.messages[conv.messages.length-1].content = finalContent;
            saveData();
        }
        // 更新最终样式，添加复制按钮
        currentStreamingBubble.innerHTML = formatLines(finalContent);
        let copyBtn = document.createElement('button');
        copyBtn.innerText = '📋 复制';
        copyBtn.className = 'copy-btn';
        copyBtn.onclick = (e) => {
            e.stopPropagation();
            copyToClip(finalContent);
        };
        currentStreamingBubble.appendChild(copyBtn);
        
        // 重置流式变量
        currentStreamingDiv = null;
        currentStreamingBubble = null;
        
        if (autoScrollEnabled) {
            scrollToBottom();
        }
    }
    
    // 监听用户滚动事件：一旦用户主动滚动，暂时禁用自动滚动3秒，尊重用户意图
    function onUserScroll() {
        if (isGenerating) {
            autoScrollEnabled = false;
            if (scrollTimeout) clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                autoScrollEnabled = true;
            }, 3000);
        }
    }
    
    // 核心发送 (流式，不阻塞滚动)
    async function sendMessage() {
        if (isGenerating) { alert('请等待回复完成'); return; }
        let userText = msgInput.value.trim();
        if (!userText && !pendingFile) return;
        
        let finalDisplayText = userText;
        let apiExtraContext = '';
        if (pendingFile) {
            finalDisplayText = userText ? `${userText}\n📎 [文件: ${pendingFile.name}]` : `📎 [文件: ${pendingFile.name}]`;
            apiExtraContext = `\n\n===== 以下为上传文件 "${pendingFile.name}" 的内容 =====\n${pendingFile.content.slice(0, 5000)}\n===== 文件内容结束 =====\n请根据该文件内容回答问题，不要直接展示全部文件原文，直接给出答案。`;
            pendingFile = null;
            clearPreview();
        }
        
        // 显示用户消息
        appendMessage('user', finalDisplayText, true);
        msgInput.value = '';
        msgInput.style.height = 'auto';
        
        // 初始化流式消息占位
        initStreamingMessage();
        
        isGenerating = true;
        sendBtn.disabled = true;
        
        // 构建 API 消息 (高效上下文)
        let conv = conversations.find(c => c.id === currentId);
        let apiMessages = [];
        apiMessages.push({ role: 'system', content: '你是DeepSeek助手，回答时请使用换行分段让阅读更舒适。如果用户上传了文件，根据文件内容回答，不要展示文件原文。直接给出清晰、分段的结果。' });
        
        // 取最近消息（排除刚添加的空assistant）
        let history = conv.messages.slice(0, -1);
        let recent = history.slice(-12);
        for (let m of recent) {
            let content = m.content;
            if (m.role === 'user' && m.content.includes('[文件:') && apiExtraContext) {
                content = m.content + apiExtraContext;
            }
            apiMessages.push({ role: m.role, content: content });
        }
        
        try {
            let response = await fetch(DEEPSEEK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: MODEL,
                    messages: apiMessages,
                    stream: true,
                    temperature: 0.6,
                    max_tokens: 2048
                })
            });
            if (!response.ok) {
                let errText = await response.text();
                throw new Error(`API ${response.status}: ${errText.slice(0, 100)}`);
            }
            
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullAnswer = '';
            let buffer = '';
            let lastUpdateTime = 0;
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (let line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed === 'data: [DONE]') continue;
                    if (trimmed.startsWith('data: ')) {
                        try {
                            const json = JSON.parse(trimmed.slice(6));
                            const delta = json.choices[0]?.delta?.content || '';
                            if (delta) {
                                fullAnswer += delta;
                                // 节流更新UI，每秒最多更新20次左右，同时保持流畅
                                const now = Date.now();
                                if (now - lastUpdateTime > 30) {
                                    updateStreamingContent(fullAnswer);
                                    lastUpdateTime = now;
                                }
                            }
                        } catch(e) { /* 忽略 */ }
                    }
                }
            }
            // 最终更新
            updateStreamingContent(fullAnswer);
            finalizeStreamingMessage(fullAnswer);
        } catch (err) {
            console.error(err);
            if (currentStreamingBubble) {
                currentStreamingBubble.innerHTML = formatLines(`❌ 请求失败: ${err.message}`);
                let copyBtn = document.createElement('button');
                copyBtn.innerText = '📋 复制';
                copyBtn.className = 'copy-btn';
                copyBtn.onclick = (e) => { e.stopPropagation(); copyToClip(`错误: ${err.message}`); };
                currentStreamingBubble.appendChild(copyBtn);
                let convErr = conversations.find(c => c.id === currentId);
                if (convErr && convErr.messages.length > 0 && convErr.messages[convErr.messages.length-1].role === 'assistant') {
                    convErr.messages[convErr.messages.length-1].content = `❌ 请求失败: ${err.message}`;
                    saveData();
                }
            } else {
                appendMessage('assistant', `❌ 请求失败: ${err.message}`, true);
            }
            currentStreamingDiv = null;
            currentStreamingBubble = null;
        } finally {
            isGenerating = false;
            sendBtn.disabled = false;
            // 恢复自动滚动标志
            autoScrollEnabled = true;
            if (scrollTimeout) clearTimeout(scrollTimeout);
        }
    }
    
    // 文件处理
    function onFileSelected(file) {
        if (!file) return;
        let reader = new FileReader();
        reader.onload = (e) => {
            let content = e.target.result;
            if (content.length > 8000) content = content.slice(0, 8000) + '\n...(截断)';
            pendingFile = { name: file.name, content: content };
            showFileBadge(file.name);
        };
        reader.onerror = () => alert('读取失败');
        reader.readAsText(file, 'UTF-8');
    }
    
    function showFileBadge(name) {
        filePreviewArea.innerHTML = `<div class="file-preview-badge">📎 已附加: ${escapeHtml(name)} <button class="remove-file" id="clearFileBtn">✖</button></div>`;
        document.getElementById('clearFileBtn')?.addEventListener('click', () => { pendingFile = null; filePreviewArea.innerHTML = ''; fileInput.value = ''; });
    }
    function clearPreview() {
        filePreviewArea.innerHTML = '';
        fileInput.value = '';
    }
    
    function scrollToTop() { 
        autoScrollEnabled = false;
        msgContainer.scrollTo({ top: 0, behavior: 'smooth' });
        setTimeout(() => { autoScrollEnabled = true; }, 500);
    }
    function scrollToBottom() { 
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }
    
    function autoResize() {
        msgInput.style.height = 'auto';
        msgInput.style.height = Math.min(100, msgInput.scrollHeight) + 'px';
    }
    
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); }
    
    function newConversation() {
        if (isGenerating) { alert('请等待回复完成'); return; }
        let newId = Date.now().toString();
        conversations.unshift({ id: newId, title: '新对话', messages: [] });
        currentId = newId;
        saveData();
        renderSidebar();
        renderMessages();
        if (window.innerWidth < 768) closeSidebar();
    }
    
    // 事件绑定
    menuToggle.addEventListener('click', () => { if (sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); });
    overlay.addEventListener('click', closeSidebar);
    newChatBtn.addEventListener('click', newConversation);
    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    msgInput.addEventListener('input', autoResize);
    fileInput.addEventListener('change', (e) => { if (e.target.files[0]) onFileSelected(e.target.files[0]); });
    scrollTopBtn.addEventListener('click', scrollToTop);
    scrollBottomBtn.addEventListener('click', scrollToBottom);
    msgContainer.addEventListener('scroll', onUserScroll);
    
    // 初始化
    loadData();
    renderSidebar();
    renderMessages();
    autoResize();
    if (!API_KEY) setTimeout(() => alert('⚠️ 未设置 API Key，请刷新页面输入'), 300);
</script>
</body>
</html>
